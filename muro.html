        const firebaseConfig = { apiKey: "AIzaSyBdh-HJHC5dbC7GrLrB6pHd6XGZAirNLcM", authDomain: "wueychat.firebaseapp.com", projectId: "wueychat", storageBucket: "wueychat.firebasestorage.app", messagingSenderId: "889745387297", appId: "1:889745387297:web:1b8343a328d854fc99d860", measurementId: "G-LKQ86ZXTRK" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
        
        const IMGBB_API_KEY = "f1ec2e833cbb9f022415d2fa76f8740f"; const CLOUDINARY_CLOUD_NAME = "dizktanb9"; const CLOUDINARY_UPLOAD_PRESET = "wueychat_media";

                const ahora = new Date().getTime(); diccionarioHistorias = {};

                if (archivoMedia.type.startsWith("image/")) { const formData = new FormData(); formData.append("image", archivoMedia); const respuestaImgbb = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData }); const datosImgbb = await respuestaImgbb.json(); if (datosImgbb.success) { urlFinal = datosImgbb.data.url; tipoFinal = "image"; } else throw new Error(); } 
                else if (archivoMedia.type.startsWith("video/")) { const formData = new FormData(); formData.append("file", archivoMedia); formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET); const urlCloudinary = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/video/upload`; const respuesta = await fetch(urlCloudinary, { method: "POST", body: formData }); const datos = await respuesta.json(); if (datos.secure_url) { urlFinal = datos.secure_url; tipoFinal = "video"; } else throw new Error(); }
                await addDoc(collection(db, "estados"), { autor: usuarioActual.email, autorNombre: usuarioActual.displayName || "Usuario", autorFoto: usuarioActual.photoURL || null, mediaUrl: urlFinal, mediaType: tipoFinal, fecha: serverTimestamp() }); e.target.value = ""; 
            } catch (error) { alert("Error al subir estado."); } finally { document.getElementById("mensaje-subiendo-historia").style.display = "none"; }
        });

        // --- 2. LÓGICA DEL VISOR (PANTALLA COMPLETA) ---
        function abrirVisor(correoAutor) {
            autorViendo = correoAutor;
            const usuarioData = diccionarioHistorias[correoAutor];
            if(!usuarioData || usuarioData.estados.length === 0) return;

            // Tomamos el último estado subido para simplicidad
            const estadoActual = usuarioData.estados[usuarioData.estados.length - 1];
            
            // Configuramos la interfaz
            document.getElementById("visor-estados").style.display = "flex";
            document.getElementById("visor-nombre").innerText = usuarioData.autorNombre;
            document.getElementById("visor-avatar").src = usuarioData.autorFoto || "https://i.ibb.co/Vv0F8sP/default-avatar.png";
            
            // Escondemos la barra de comentar si es NUESTRO estado
            if(correoAutor === usuarioActual.email) { document.getElementById("visor-interaccion").style.display = "none"; } 
            else { document.getElementById("visor-interaccion").style.display = "flex"; document.getElementById("input-respuesta-estado").value = ""; }

            const cajaContenido = document.getElementById("visor-contenido");
            const barra = document.getElementById("barra-progreso");
            cajaContenido.innerHTML = ""; barra.style.width = "0%"; barra.style.transition = "none";

            if(estadoActual.mediaType === "video") {
                const vid = document.createElement("video"); vid.className = "visor-media-video"; vid.src = estadoActual.mediaUrl; vid.autoplay = true; vid.playsInline = true;
                cajaContenido.appendChild(vid);
                vid.onloadedmetadata = () => { setTimeout(() => { barra.style.transition = `width ${vid.duration}s linear`; barra.style.width = "100%"; }, 50); };
                vid.onended = cerrarVisor;
            } else {
                const img = document.createElement("img"); img.className = "visor-media-img"; img.src = estadoActual.mediaUrl;
                cajaContenido.appendChild(img);
                setTimeout(() => { barra.style.transition = `width 5s linear`; barra.style.width = "100%"; }, 50);
                timeoutVisor = setTimeout(cerrarVisor, 5000); // Cierra en 5 segundos
            }
        }

        function cerrarVisor() {
            document.getElementById("visor-estados").style.display = "none";
            document.getElementById("visor-contenido").innerHTML = ""; // Limpiar video/foto
            if(timeoutVisor) clearTimeout(timeoutVisor);
            autorViendo = null;
        }

        document.getElementById("btn-cerrar-visor").addEventListener("click", cerrarVisor);

        // --- 3. RESPONDER ESTADOS (SE VA A LA CAMPANITA) ---
        async function enviarRespuestaEstado(mensaje, esEmoji = false) {
            if(!autorViendo || autorViendo === usuarioActual.email) return;
            try {
                let textoNoti = esEmoji ? `Reaccionó a tu estado: ${mensaje}` : `Respondió a tu estado: "${mensaje}"`;
                await addDoc(collection(db, "notificaciones"), {
                    para: autorViendo, de: usuarioActual.email, deNombre: usuarioActual.displayName || "Alguien",
                    tipo: "respuesta_estado", mensajeTexto: textoNoti, leida: false, fecha: serverTimestamp()
                });
                
                // Mostrar "Enviado ✅"
                const toast = document.getElementById("toast-enviado");
                toast.style.display = "block"; setTimeout(() => { toast.style.display = "none"; cerrarVisor(); }, 1500);
            } catch (err) { console.error(err); }
        }

        document.getElementById("btn-enviar-respuesta").addEventListener("click", () => {
            const txt = document.getElementById("input-respuesta-estado").value.trim();
            if(txt) enviarRespuestaEstado(txt, false);
        });

        document.querySelectorAll(".visor-emoji").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const emoji = e.target.getAttribute("data-emoji");
                enviarRespuestaEstado(emoji, true);
            });
        });

        // --- CÓDIGO VIEJO (NO SE TOCÓ) ---
        document.getElementById("buscador-muro").addEventListener("input", (e) => {
            const textoBuscado = e.target.value.toLowerCase(); const todasLasNotas = document.querySelectorAll(".post"); let notasVisibles = 0;
            todasLasNotas.forEach(nota => { const contenidoNota = nota.textContent.toLowerCase(); if (contenidoNota.includes(textoBuscado)) { nota.style.display = "block"; notasVisibles++; } else { nota.style.display = "none"; } });
            document.getElementById("mensaje-no-resultados").style.display = (notasVisibles === 0 && textoBuscado !== "") ? "block" : "none";
        });

        function escucharNotificaciones() {
            const qNoti = query(collection(db, "notificaciones"), where("para", "==", usuarioActual.email));
            onSnapshot(qNoti, (snapshot) => {
                const listaDiv = document.getElementById("lista-notificaciones"); const puntoRojo = document.getElementById("punto-rojo");
                listaDiv.innerHTML = ""; let noLeidas = 0; let notis = [];
                snapshot.forEach(docSnap => { const noti = docSnap.data(); noti.id = docSnap.id; if(noti.fecha) { notis.push(noti); } if (!noti.leida) noLeidas++; });
                notis.sort((a, b) => b.fecha.toMillis() - a.fecha.toMillis()); puntoRojo.style.display = noLeidas > 0 ? "block" : "none";
                if (notis.length === 0) { listaDiv.innerHTML = "<p style='color: var(--texto-secundario); text-align: center; font-size: 14px;'>No tienes alertas nuevas.</p>"; return; }
                notis.forEach(noti => {
                    const item = document.createElement("div"); item.className = `noti-item ${noti.leida ? '' : 'no-leida'}`; item.dataset.id = noti.id;
                    let texto = ""; if (noti.tipo === "reaccion") texto = `A <strong>${noti.deNombre}</strong> le gustó tu nota.`; if (noti.tipo === "comentario") texto = `<strong>${noti.deNombre}</strong> comentó tu publicación.`; if (noti.tipo === "respuesta_estado") texto = `<strong>${noti.deNombre}</strong> ${noti.mensajeTexto}`; item.innerHTML = texto; listaDiv.appendChild(item);
                });
            });
        }

        document.getElementById("btn-campanita").addEventListener("click", (e) => {
            e.stopPropagation(); const panel = document.getElementById("panel-notificaciones"); panel.style.display = panel.style.display === "block" ? "none" : "block";
            if (panel.style.display === "block") { document.querySelectorAll(".noti-item.no-leida").forEach(async (item) => { try { await updateDoc(doc(db, "notificaciones", item.dataset.id), { leida: true }); } catch(err){} }); }
        });

        const btnPublicar = document.getElementById("btn-publicar");
        btnPublicar.addEventListener("click", async () => {
            const texto = document.getElementById("texto-publicacion").value.trim(); const archivoMedia = document.getElementById("archivo-publicacion").files[0];
            if (texto === "" && !archivoMedia) return;
            btnPublicar.disabled = true; document.getElementById("mensaje-publicando").style.display = "block";
            let urlFinal = null; let tipoFinal = null;
            try {
                if (archivoMedia) {
                    if (archivoMedia.type.startsWith("image/")) { const formData = new FormData(); formData.append("image", archivoMedia); const respuestaImgbb = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData }); const datosImgbb = await respuestaImgbb.json(); if (datosImgbb.success) { urlFinal = datosImgbb.data.url; tipoFinal = "image"; } else throw new Error();
                    } else if (archivoMedia.type.startsWith("video/")) { const formData = new FormData(); formData.append("file", archivoMedia); formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET); const urlCloudinary = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/video/upload`; const respuesta = await fetch(urlCloudinary, { method: "POST", body: formData }); const datos = await respuesta.json(); if (datos.secure_url) { urlFinal = datos.secure_url; tipoFinal = "video"; } else throw new Error(); }
                }
                await addDoc(collection(db, "publicaciones"), { autor: usuarioActual.email, autorNombre: usuarioActual.displayName || "Usuario", autorFoto: usuarioActual.photoURL || null, texto: texto, mediaUrl: urlFinal, mediaType: tipoFinal, imagenUrl: (tipoFinal === "image") ? urlFinal : null, fecha: serverTimestamp(), reacciones: {}, comentarios: [] });
                document.getElementById("texto-publicacion").value = ""; document.getElementById("archivo-publicacion").value = "";
            } catch (error) { console.error(error); alert("Error al subir la publicación."); } finally { btnPublicar.disabled = false; document.getElementById("mensaje-publicando").style.display = "none"; }
        });

        function cargarPublicaciones() {
            const feedDiv = document.getElementById("feed"); const q = query(collection(db, "publicaciones"), orderBy("fecha", "desc"));
            onSnapshot(q, (snapshot) => {
                feedDiv.innerHTML = ""; const textoBuscadoActual = document.getElementById("buscador-muro").value.toLowerCase();
                snapshot.forEach((documentoFirebase) => {
                    try {
                        const post = documentoFirebase.data(); const postId = documentoFirebase.id; 
                        if (post.fecha) {
                            const cajaPost = document.createElement("div"); cajaPost.classList.add("post"); const nombreMostrar = post.autorNombre ? post.autorNombre : post.autor; const fText = post.fecha.toDate().toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }) + " " + post.fecha.toDate().toLocaleTimeString('es-ES', { hour: '2-digit', minute:'2-digit' });
                            let avatarHTML = post.autorFoto ? `<img src="${post.autorFoto}" class="post-avatar">` : `<div class="post-avatar">${nombreMostrar.charAt(0).toUpperCase()}</div>`;
                            let htmlContenido = `<div class="post-cabecera">${avatarHTML}<div class="info-autor"><div class="post-autor"><a href="perfil_publico.html?usuario=${post.autor}">${nombreMostrar}</a></div><div class="post-fecha">${fText}</div></div></div>`;
                            if (post.texto) htmlContenido += `<div class="post-texto">${post.texto}</div>`;
                            const urlArchivo = post.mediaUrl || post.imagenUrl; const tipoArchivo = post.mediaType || (post.imagenUrl ? "image" : null);
                            if (urlArchivo) { if (tipoArchivo === "video") { htmlContenido += `<video src="${urlArchivo}" class="post-video" controls preload="metadata"></video>`; } else { htmlContenido += `<img src="${urlArchivo}" class="post-imagen">`; } }
                            const reacciones = post.reacciones || {}; const conteoEmojis = {}; let miReaccionActual = null; for (const [correo, emoji] of Object.entries(reacciones)) { conteoEmojis[emoji] = (conteoEmojis[emoji] || 0) + 1; if (correo === llaveUsuarioActual) miReaccionActual = emoji; } const textoReacciones = Object.entries(conteoEmojis).map(([e, total]) => `${e} ${total}`).join('   '); let botonEliminarHTML = post.autor === usuarioActual.email ? `<button class="btn-eliminar" data-id="${postId}">🗑️</button>` : "";
                            htmlContenido += `<div class="contenedor-reacciones"><div class="seccion-izquierda"><button class="btn-reaccionar-premium">${miReaccionActual ? miReaccionActual : '👍'}</button><div class="menu-emojis"><span class="emoji" data-id="${postId}" data-emoji="👍" data-autor="${post.autor}">👍</span><span class="emoji" data-id="${postId}" data-emoji="❤️" data-autor="${post.autor}">❤️</span><span class="emoji" data-id="${postId}" data-emoji="😂" data-autor="${post.autor}">😂</span><span class="emoji" data-id="${postId}" data-emoji="😮" data-autor="${post.autor}">😮</span><span class="emoji" data-id="${postId}" data-emoji="😢" data-autor="${post.autor}">😢</span></div>${textoReacciones ? `<div class="lista-reacciones">${textoReacciones}</div>` : ''}</div>${botonEliminarHTML}</div>`;
                            let htmlComentarios = `<div class="seccion-comentarios">`; if (post.comentarios && post.comentarios.length > 0) { post.comentarios.forEach(comentario => { htmlComentarios += `<div style="margin-bottom: 5px;"><div class="comentario"><strong><a href="perfil_publico.html?usuario=${comentario.autor}" style="color: inherit; text-decoration: none;">${comentario.autorNombre}</a>:</strong> ${comentario.texto}</div></div>`; }); } htmlComentarios += `<div class="caja-escribir-comentario"><input type="text" class="input-comentario" id="input-comentario-${postId}" placeholder="Escribe un comentario..."><button class="btn-enviar-comentario" data-id="${postId}" data-autor="${post.autor}">➤</button></div></div>`;
                            htmlContenido += htmlComentarios; cajaPost.innerHTML = htmlContenido; 
                            if (textoBuscadoActual !== "" && !cajaPost.textContent.toLowerCase().includes(textoBuscadoActual)) { cajaPost.style.display = "none"; } feedDiv.appendChild(cajaPost);
                        }
                    } catch (errorPost) {}
                });
            });
        }

        document.getElementById("feed").addEventListener("click", async (e) => {
            if (e.target.classList.contains("emoji")) {
                const postId = e.target.getAttribute("data-id"); const emojiElegido = e.target.getAttribute("data-emoji"); const autorDelPost = e.target.getAttribute("data-autor");
                const ref = doc(db, "publicaciones", postId); const act = {}; act[`reacciones.${llaveUsuarioActual}`] = emojiElegido;
                try { await updateDoc(ref, act); if (autorDelPost !== usuarioActual.email) { await addDoc(collection(db, "notificaciones"), { para: autorDelPost, de: usuarioActual.email, deNombre: usuarioActual.displayName || "Alguien", tipo: "reaccion", emoji: emojiElegido, leida: false, fecha: serverTimestamp() }); } } catch (err) { console.error(err); }
            }
            if (e.target.classList.contains("btn-eliminar")) { const postId = e.target.getAttribute("data-id"); if (confirm("¿Borrar nota para siempre?")) { try { await deleteDoc(doc(db, "publicaciones", postId)); } catch (err) { console.error(err); } } }
            if (e.target.classList.contains("btn-enviar-comentario")) {
                const postId = e.target.getAttribute("data-id"); const autorDelPost = e.target.getAttribute("data-autor"); const inputElemento = document.getElementById(`input-comentario-${postId}`); const textoComentario = inputElemento.value.trim();
                if (textoComentario !== "") {
                    e.target.disabled = true;
                    try { const ref = doc(db, "publicaciones", postId); const nuevoComentario = { autor: usuarioActual.email, autorNombre: usuarioActual.displayName || "Usuario", texto: textoComentario }; await updateDoc(ref, { comentarios: arrayUnion(nuevoComentario) });
                        if (autorDelPost !== usuarioActual.email) { await addDoc(collection(db, "notificaciones"), { para: autorDelPost, de: usuarioActual.email, deNombre: usuarioActual.displayName || "Alguien", tipo: "comentario", leida: false, fecha: serverTimestamp() }); } inputElemento.value = ""; 
                    } catch (err) { alert("Error al comentar."); } finally { e.target.disabled = false; }
                }
            }
        });
        
        document.getElementById("feed").addEventListener("keypress", async (e) => { if (e.key === "Enter" && e.target.classList.contains("input-comentario")) { const postId = e.target.id.replace("input-comentario-", ""); const btnEnviar = document.querySelector(`.btn-enviar-comentario[data-id="${postId}"]`); if(btnEnviar) btnEnviar.click(); } });
    </script>
</body>
</html>
