<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wueychat - Muro Premium</title>
    <style>
        /* --- VARIABLES DE DISEÑO (Colores Premium) --- */
        :root[data-theme="light"] {
            --fondo: #f0f2f5;
            --fondo-carta: #ffffff;
            --texto-principal: #1c1e21;
            --texto-secundario: #606770;
            --color-primario: #1877f2;
            --color-hover: #166fe5;
            --borde: #dddfe2;
            --sombra: rgba(0, 0, 0, 0.1);
            --fondo-barra: rgba(255, 255, 255, 0.8); /* Glassmorphism light */
        }
        
        :root[data-theme="dark"] {
            --fondo: #18191a;
            --fondo-carta: #242526;
            --texto-principal: #e4e6eb;
            --texto-secundario: #b0b3b8;
            --color-primario: #2e89ff;
            --color-hover: #4e9eff;
            --borde: #3e4042;
            --sombra: rgba(0, 0, 0, 0.3);
            --fondo-barra: rgba(36, 37, 38, 0.8); /* Glassmorphism dark */
        }

        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--fondo); color: var(--texto-principal); margin: 0; padding-top: 70px; padding-bottom: 80px; transition: background 0.3s ease; }
        
        /* --- LAYOUT PRINCIPAL --- */
        .contenedor-principal { max-width: 600px; margin: 0 auto; padding: 0 15px; }

        /* --- BARRAS SUPERIOR E INFERIOR (Glassmorphism) --- */
        .barra-superior, .barra-inferior {
            position: fixed; left: 0; width: 100%; box-sizing: border-box;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            background-color: var(--fondo-barra); z-index: 100;
            transition: background 0.3s ease, border 0.3s ease;
        }

        .barra-superior { top: 0; height: 65px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--borde); box-shadow: 0 2px 4px var(--sombra); }
        .barra-superior h1 { color: var(--color-primario); margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -1px; }

        .barra-inferior { bottom: 0; height: 70px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--borde); box-shadow: 0 -2px 4px var(--sombra); }

        /* --- BOTONES Y ENLACES PREMIUM --- */
        .btn-icono { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--texto-principal); padding: 10px; border-radius: 50%; transition: all 0.2s ease; }
        .btn-icono:hover { background-color: rgba(128, 128, 128, 0.1); transform: scale(1.1); }
        .btn-icono.activo { color: var(--color-primario); background-color: rgba(24, 119, 242, 0.1); }

        .nav-link { text-decoration: none; color: var(--texto-principal); display: flex; flex-direction: column; align-items: center; font-size: 12px; font-weight: bold; }
        .nav-link:hover { color: var(--color-primario); }

        /* --- ANIMACIONES KEYFRAMES --- */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }

        /* --- CONTENEDOR PUBLICAR --- */
        .contenedor-publicacion {
            background-color: var(--fondo-carta); padding: 20px; border-radius: 16px;
            box-shadow: 0 4px 12px var(--sombra); margin-bottom: 25px;
            animation: popIn 0.5s ease-out; /* Animación de entrada */
            border: 1px solid var(--borde);
        }
        textarea {
            width: 100%; padding: 15px; border: 1px solid var(--borde); border-radius: 12px;
            box-sizing: border-box; resize: none; font-size: 16px;
            background-color: var(--fondo); color: var(--texto-principal);
            transition: all 0.2s ease;
        }
        textarea:focus { outline: none; border-color: var(--color-primario); box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.2); }
        
        .acciones-publicar { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; gap: 10px; }
        input[type="file"] { font-size: 14px; color: var(--texto-secundario); max-width: 50%; }
        
        .btn-publicar {
            background-color: var(--color-primario); color: white; border: none;
            padding: 12px 24px; border-radius: 12px; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: all 0.2s ease; flex-grow: 1;
        }
        .btn-publicar:hover { background-color: var(--color-hover); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .btn-publicar:active { transform: translateY(0); }
        .btn-publicar:disabled { background-color: var(--borde); cursor: not-allowed; transform: none; box-shadow: none; }
        
        /* --- ESTILOS DE LOS POSTS (Tarjetas Premium) --- */
        .post {
            background-color: var(--fondo-carta); padding: 20px; border-radius: 16px;
            box-shadow: 0 2px 8px var(--sombra); margin-bottom: 20px;
            border: 1px solid var(--borde);
            animation: fadeInUp 0.4s ease-out; /* Animación al aparecer */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .post:hover { transform: translateY(-3px); box-shadow: 0 6px 16px var(--sombra); }
        
        .post-cabecera { display: flex; align-items: center; margin-bottom: 15px; gap: 12px; }
        
        /* Estilo para el Avatar circulito en el muro */
        .post-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--color-primario); background-color: var(--color-primario); color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; }
        
        .info-autor { display: flex; flex-direction: column; flex-grow: 1; }
        .post-autor a { font-weight: bold; color: var(--texto-principal); font-size: 17px; text-decoration: none; transition: color 0.2s ease; }
        .post-autor a:hover { color: var(--color-primario); text-decoration: underline; }
        .post-fecha { font-size: 13px; color: var(--texto-secundario); margin-top: 2px; }
        
        .post-texto { color: var(--texto-principal); font-size: 16px; line-height: 1.6; margin-bottom: 15px; white-space: pre-wrap; }
        .post-imagen { max-width: 100%; border-radius: 12px; margin-top: 5px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }

        /* --- REACCIONES PREMIUM --- */
        .contenedor-reacciones { position: relative; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--borde); display: flex; align-items: center; justify-content: space-between; }
        
        .seccion-izquierda { display: flex; align-items: center; gap: 8px; }
        
        .btn-reaccionar-premium {
            background-color: var(--fondo); border: 1px solid var(--borde);
            color: var(--texto-secundario); font-weight: bold;
            cursor: pointer; padding: 10px 18px; border-radius: 20px; font-size: 14px;
            transition: all 0.2s ease;
        }
        .btn-reaccionar-premium:hover { background-color: var(--borde); color: var(--texto-principal); }
        
        /* Burbuja de emojis animada */
        .menu-emojis {
            display: none; position: absolute; bottom: 55px; left: 0;
            background: var(--fondo-carta); padding: 8px 15px; border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); gap: 12px; z-index: 10;
            border: 1px solid var(--borde);
            animation: popIn 0.3s ease-out;
        }
        .seccion-izquierda:hover .menu-emojis { display: flex; }
        
        .emoji { cursor: pointer; font-size: 28px; transition: transform 0.2s ease; display: inline-block; }
        .emoji:hover { transform: scale(1.4) translateY(-8px); }
        
        .lista-reacciones { font-size: 14px; color: var(--texto-secundario); font-weight: 500; background-color: var(--fondo); padding: 8px 15px; border-radius: 20px; }

        .btn-eliminar { background: none; border: none; color: #ff4d4d; font-weight: bold; cursor: pointer; font-size: 14px; padding: 10px 15px; border-radius: 10px; transition: all 0.2s ease; }
        .btn-eliminar:hover { background-color: rgba(255, 77, 77, 0.1); }
    </style>
</head>
<body>

    <div class="barra-superior">
        <h1>Wueychat</h1>
        <div style="display: flex; align-items: center; gap: 10px;">
            <button id="btn-theme" class="btn-icono">☀️</button>
            <button id="btn-salir-top" class="btn-eliminar" style="font-size: 12px; padding: 8px;">Salir</button>
        </div>
    </div>

    <div class="contenedor-principal">
        <div class="contenedor-publicacion">
            <textarea id="texto-publicacion" rows="3" placeholder="¿Qué tienes en mente, Adriano?"></textarea>
            <div class="acciones-publicar">
                <input type="file" id="imagen-publicacion" accept="image/*">
                <button id="btn-publicar" class="btn-publicar">Publicar</button>
            </div>
            <p id="mensaje-publicando" style="color: var(--color-primario); font-size: 14px; display: none; text-align: center; margin-top: 15px; font-weight: bold;">✨ Subiendo tu magia...</p>
        </div>

        <div id="feed"></div>
    </div>

    <div class="barra-inferior">
        <a href="muro.html" class="nav-link activo">
            <button class="btn-icono activo">🏠</button>
            <span>Inicio</span>
        </a>
        <a href="perfil.html" class="nav-link">
            <button class="btn-icono">👤</button>
            <span>Mi Perfil</span>
        </a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        // Importamos getDoc para buscar los avatares
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdh-HJHC5dbC7GrLrB6pHd6XGZAirNLcM",
            authDomain: "wueychat.firebaseapp.com",
            projectId: "wueychat",
            storageBucket: "wueychat.firebasestorage.app",
            messagingSenderId: "889745387297",
            appId: "1:889745387297:web:1b8343a328d854fc99d860",
            measurementId: "G-LKQ86ZXTRK"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const IMGBB_API_KEY = "f1ec2e833cbb9f022415d2fa76f8740f";

        let usuarioActual = null;
        let llaveUsuarioActual = null;

        // --- LÓGICA DE MODO OSCURO (PREMIUM) ---
        const btnTheme = document.getElementById('btn-theme');
        const html = document.documentElement;
        
        // Cargar tema guardado
        const temaGuardado = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', temaGuardado);
        btnTheme.innerText = temaGuardado === 'light' ? '☀️' : '🌙';

        btnTheme.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const nuevoTema = currentTheme === 'light' ? 'dark' : 'light';
            
            html.setAttribute('data-theme', nuevoTema);
            localStorage.setItem('theme', nuevoTema);
            btnTheme.innerText = nuevoTema === 'light' ? '☀️' : '🌙';
            
            // Animación suave de pulso al cambiar
            btnTheme.animate([{ transform: 'scale(1)' }, { transform: 'scale(1.2)' }, { transform: 'scale(1)' }], { duration: 300 });
        });

        // --- AUTENTICACIÓN ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                usuarioActual = user;
                llaveUsuarioActual = user.email.replace(/\./g, '_'); 
                // Ya no mostramos el correo arriba, se ve más limpio
                cargarPublicaciones();
            } else {
                window.location.href = "index.html";
            }
        });

        const cerrarSesion = () => signOut(auth);
        document.getElementById("btn-salir-top").addEventListener("click", cerrarSesion);

        // --- PUBLICAR ---
        const btnPublicar = document.getElementById("btn-publicar");
        const inputTexto = document.getElementById("texto-publicacion");
        const inputImagen = document.getElementById("imagen-publicacion");
        const mensajePublicando = document.getElementById("mensaje-publicando");

        btnPublicar.addEventListener("click", async () => {
            const texto = inputTexto.value.trim();
            const archivoImagen = inputImagen.files[0];

            if (texto === "" && !archivoImagen) return;

            btnPublicar.disabled = true;
            mensajePublicando.style.display = "block";
            btnPublicar.innerText = "Subiendo...";

            let urlImagenFinal = null;

            try {
                if (archivoImagen) {
                    const formData = new FormData();
                    formData.append("image", archivoImagen);
                    const respuestaImgbb = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                    const datosImgbb = await respuestaImgbb.json();
                    if (datosImgbb.success) urlImagenFinal = datosImgbb.data.url;
                }

                // Guardamos la nota CON LA FOTO DE PERFIL ACTUAL del autor
                await addDoc(collection(db, "publicaciones"), {
                    autor: usuarioActual.email,
                    autorNombre: usuarioActual.displayName || "Wuey sin nombre", 
                    autorFoto: usuarioActual.photoURL || null, // NUEVO: Guardamos la foto aquí
                    texto: texto,
                    imagenUrl: urlImagenFinal,
                    fecha: serverTimestamp(),
                    reacciones: {} 
                });

                inputTexto.value = ""; inputImagen.value = "";
                inputTexto.style.height = "auto"; // Resetear altura
            } catch (error) {
                console.error(error); alert("Error al publicar.");
            } finally {
                btnPublicar.disabled = false;
                mensajePublicando.style.display = "none";
                btnPublicar.innerText = "Publicar";
            }
        });

        // Auto-expandir textarea al escribir
        inputTexto.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // --- CARGAR FEED (DIBUJAR TODO PREMIUM) ---
        function cargarPublicaciones() {
            const feedDiv = document.getElementById("feed");
            const q = query(collection(db, "publicaciones"), orderBy("fecha", "desc"));

            onSnapshot(q, (snapshot) => {
                feedDiv.innerHTML = "";
                
                snapshot.forEach((documentoFirebase) => {
                    const post = documentoFirebase.data();
                    const postId = documentoFirebase.id; 
                    
                    if (post.fecha) {
                        const cajaPost = document.createElement("div");
                        cajaPost.classList.add("post");
                        
                        const nombreMostrar = post.autorNombre ? post.autorNombre : post.autor;
                        const fechaObj = post.fecha.toDate();
                        // Fecha amigable premium
                        const fechaTexto = fechaObj.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }) + ", " + fechaObj.toLocaleTimeString('es-ES', { hour: '2-digit', minute:'2-digit' });
                        
                        // --- DIBUJAR AVATAR (NUEVO PREMIUM) ---
                        let avatarHTML = "";
                        if (post.autorFoto) {
                            // Si tiene foto, dibujamos la imagen
                            avatarHTML = `<img src="${post.autorFoto}" class="post-avatar" alt="Avatar">`;
                        } else {
                            // Si no tiene, dibujamos la inicial
                            const inicial = nombreMostrar.charAt(0).toUpperCase();
                            avatarHTML = `<div class="post-avatar">${inicial}</div>`;
                        }

                        let htmlContenido = `
                            <div class="post-cabecera">
                                ${avatarHTML}
                                <div class="info-autor">
                                    <div class="post-autor">
                                        <a href="perfil_publico.html?usuario=${post.autor}">${nombreMostrar}</a>
                                    </div>
                                    <div class="post-fecha">${fechaTexto}</div>
                                </div>
                            </div>
                        `;
                        
                        if (post.texto) htmlContenido += `<div class="post-texto">${post.texto}</div>`;
                        if (post.imagenUrl) htmlContenido += `<img src="${post.imagenUrl}" class="post-imagen" loading="lazy">`;

                        // Lógica de Reacciones
                        const reacciones = post.reacciones || {};
                        const conteoEmojis = {};
                        let miReaccionActual = null;

                        for (const [correoModificado, emoji] of Object.entries(reacciones)) {
                            conteoEmojis[emoji] = (conteoEmojis[emoji] || 0) + 1;
                            if (correoModificado === llaveUsuarioActual) miReaccionActual = emoji;
                        }

                        const textoReacciones = Object.entries(conteoEmojis).map(([e, total]) => `${e} ${total}`).join('   ');

                        let botonEliminarHTML = "";
                        if (post.autor === usuarioActual.email) {
                            botonEliminarHTML = `<button class="btn-eliminar" data-id="${postId}">🗑️</button>`;
                        }

                        htmlContenido += `
                            <div class="contenedor-reacciones">
                                <div class="seccion-izquierda">
                                    <button class="btn-reaccionar-premium">${miReaccionActual ? miReaccionActual : '👍'}</button>
                                    <div class="menu-emojis">
                                        <span class="emoji" data-id="${postId}" data-emoji="👍">👍</span>
                                        <span class="emoji" data-id="${postId}" data-emoji="❤️">❤️</span>
                                        <span class="emoji" data-id="${postId}" data-emoji="😂">😂</span>
                                        <span class="emoji" data-id="${postId}" data-emoji="😮">😮</span>
                                        <span class="emoji" data-id="${postId}" data-emoji="😢">😢</span>
                                    </div>
                                    ${textoReacciones ? `<div class="lista-reacciones">${textoReacciones}</div>` : ''}
                                </div>
                                ${botonEliminarHTML}
                            </div>
                        `;

                        cajaPost.innerHTML = htmlContenido;
                        feedDiv.appendChild(cajaPost);
                    }
                });
            });
