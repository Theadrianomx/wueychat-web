<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wueychat - Muro Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root[data-theme="light"]{--fondo:#f0f2f5;--fondo-carta:#ffffff;--texto-principal:#1c1e21;--texto-secundario:#606770;--color-primario:#1877f2;--borde:#dddfe2;--sombra:rgba(0,0,0,0.1);--fondo-barra:rgba(255,255,255,0.85);--fondo-comentario:#f0f2f5;}
        :root[data-theme="dark"]{--fondo:#18191a;--fondo-carta:#242526;--texto-principal:#e4e6eb;--texto-secundario:#b0b3b8;--color-primario:#2e89ff;--borde:#3e4042;--sombra:rgba(0,0,0,0.4);--fondo-barra:rgba(36,37,38,0.85);--fondo-comentario:#3a3b3c;}
        body{font-family:'Segoe UI',Arial,sans-serif;background-color:var(--fondo);color:var(--texto-principal);margin:0;padding-top:70px;padding-bottom:80px;transition:background 0.3s ease;}
        .contenedor-principal{max-width:600px;margin:0 auto;padding:0 15px;}
        .barra-superior,.barra-inferior{position:fixed;left:0;width:100%;box-sizing:border-box;backdrop-filter:blur(8px);background-color:var(--fondo-barra);z-index:100;border-bottom:1px solid var(--borde);}
        .barra-superior{top:0;height:65px;display:flex;justify-content:space-between;align-items:center;padding:0 15px;box-shadow:0 2px 5px var(--sombra);gap:10px;}
        .barra-superior h1{color:var(--color-primario);margin:0;font-size:22px;font-weight:bold;display:none;}
        .contenedor-buscador{flex-grow:1;max-width:350px;position:relative;}
        .input-buscador{width:100%;padding:10px 15px 10px 35px;border-radius:20px;border:1px solid var(--borde);background-color:var(--fondo-carta);color:var(--texto-principal);font-size:14px;box-sizing:border-box;}
        .icono-lupa{position:absolute;left:12px;top:10px;font-size:14px;color:var(--texto-secundario);}
        @media(min-width:500px){.barra-superior h1{display:block;}}
        .barra-inferior{bottom:0;height:70px;display:flex;justify-content:space-around;align-items:center;border-top:1px solid var(--borde);box-shadow:0 -2px 5px var(--sombra);border-bottom:none;}
        .btn-icono{background:none;border:none;font-size:24px;cursor:pointer;color:var(--texto-principal);padding:8px;border-radius:50%;}
        .nav-link{text-decoration:none;color:var(--texto-principal);display:flex;flex-direction:column;align-items:center;font-size:12px;font-weight:bold;}
        .nav-link.activo .btn-icono{color:var(--color-primario);background-color:rgba(24,119,242,0.1);}
        .btn-eliminar-top{background:none;border:none;color:#ff4d4d;font-weight:bold;cursor:pointer;font-size:14px;padding:8px;border-radius:8px;}
        .contenedor-campanita{position:relative;}
        .punto-rojo{position:absolute;top:6px;right:6px;width:10px;height:10px;background-color:#ff3b30;border-radius:50%;border:2px solid var(--fondo-barra);display:none;}
        .panel-notificaciones{display:none;position:absolute;top:55px;right:-10px;width:280px;max-height:350px;overflow-y:auto;background-color:var(--fondo-carta);border:1px solid var(--borde);border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.2);padding:10px;z-index:200;}
        .noti-item{padding:12px;border-bottom:1px solid var(--borde);font-size:14px;color:var(--texto-principal);border-radius:8px;margin-bottom:5px;}
        .noti-item.no-leida{background-color:rgba(24,119,242,0.1);font-weight:bold;}
        .contenedor-historias{display:flex;gap:15px;overflow-x:auto;padding:15px 0 5px 0;margin-bottom:20px;scrollbar-width:none;}
        .contenedor-historias::-webkit-scrollbar{display:none;}
        .historia-item{display:flex;flex-direction:column;align-items:center;min-width:75px;cursor:pointer;position:relative;}
        .historia-avatar-contenedor{width:64px;height:64px;border-radius:50%;padding:3px;background:none;display:flex;justify-content:center;align-items:center;margin-bottom:5px;}
        .historia-avatar-contenedor.activa{background:linear-gradient(45deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);}
        .historia-avatar{width:60px;height:60px;border-radius:50%;border:3px solid var(--fondo);object-fit:cover;background-color:var(--fondo-carta);display:flex;justify-content:center;align-items:center;font-size:24px;font-weight:bold;color:var(--texto-secundario);}
        .historia-nombre{font-size:12px;color:var(--texto-principal);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:75px;text-align:center;}
        .btn-agregar-icono{position:absolute;bottom:20px;right:0;background-color:var(--color-primario);color:white;border-radius:50%;width:22px;height:22px;display:flex;justify-content:center;align-items:center;font-size:16px;font-weight:bold;}
        .caja-crear-post-falsa{background-color:var(--fondo-carta);padding:15px;border-radius:12px;box-shadow:0 2px 8px var(--sombra);margin-bottom:25px;border:1px solid var(--borde);display:flex;align-items:center;gap:15px;cursor:pointer;}
        .caja-crear-post-falsa img{width:40px;height:40px;border-radius:50%;object-fit:cover;}
        .caja-crear-post-falsa .texto-falso{flex-grow:1;background:var(--fondo);padding:10px 15px;border-radius:20px;color:var(--texto-secundario);font-size:15px;border:1px solid var(--borde);}
        .iconos-rapidos{display:flex;gap:10px;font-size:20px;}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:500;justify-content:center;align-items:center;padding:15px;box-sizing:border-box;backdrop-filter:blur(5px);}
        .modal-box{background:var(--fondo-carta);padding:20px;border-radius:15px;width:100%;max-width:500px;border:1px solid var(--borde);box-shadow:0 10px 30px rgba(0,0,0,0.3);position:relative;}
        .modal-box h3{margin-top:0;color:var(--texto-principal);text-align:center;border-bottom:1px solid var(--borde);padding-bottom:10px;}
        .btn-cerrar-modal{position:absolute;top:15px;right:15px;background:var(--fondo);border:none;width:30px;height:30px;border-radius:50%;font-weight:bold;cursor:pointer;color:var(--texto-principal);}
        .input-modal{width:100%;padding:12px;border-radius:8px;border:1px solid var(--borde);background:var(--fondo);color:var(--texto-principal);margin-bottom:15px;resize:none;font-family:inherit;font-size:16px;box-sizing:border-box;}
        #texto-publicacion{font-size:18px;border:none;background:transparent;padding:0;margin-bottom:15px;height:100px;width:100%;resize:none;color:var(--texto-principal);}
        #texto-publicacion:focus{outline:none;}
        .opciones-publicacion{display:flex;flex-direction:column;gap:10px;border-top:1px solid var(--borde);padding-top:15px;margin-bottom:15px;}
        .opcion-fila{display:flex;align-items:center;gap:10px;background:var(--fondo);padding:10px;border-radius:8px;border:1px solid var(--borde);font-weight:bold;font-size:14px;color:var(--texto-principal);}
        .toggle-3d{accent-color:#1877f2;width:18px;height:18px;cursor:pointer;}
        .btn-publicar{background-color:var(--color-primario);color:white;border:none;padding:12px;border-radius:8px;font-weight:bold;font-size:16px;cursor:pointer;width:100%;}
        .btn-publicar:disabled{background-color:#888;}
        #error-publicacion{display:none;background:rgba(255,77,77,0.1);color:#ff4d4d;border:1px solid rgba(255,77,77,0.3);padding:10px;border-radius:8px;font-size:13px;font-weight:bold;text-align:center;margin-bottom:15px;}
        .modal-box.gamer{background:#1a1a24;border:1px solid #00ffcc;color:white;}
        .modal-box.gamer h3{color:#00ffcc;border-bottom-color:#333;}
        .modal-box.gamer .input-modal{background:#16161e;border-color:#444;color:white;}
        .btn-accion-modal{flex:1;padding:10px;border-radius:8px;border:none;font-weight:bold;cursor:pointer;}
        .visor-estados{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background-color:#000;z-index:1000;flex-direction:column;}
        .visor-barra-progreso{width:100%;height:3px;background-color:rgba(255,255,255,0.3);margin-top:10px;display:flex;}
        .visor-progreso-lleno{height:100%;background-color:#fff;width:0%;transition:width linear;}
        .visor-cabecera{display:flex;justify-content:space-between;align-items:center;padding:15px;color:white;position:absolute;top:15px;width:100%;box-sizing:border-box;z-index:10;background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);}
        .visor-avatar-img{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid white;}
        .visor-nombre-texto{font-weight:bold;font-size:16px;}
        .btn-cerrar-visor{background:none;border:none;color:white;font-size:28px;cursor:pointer;}
        .visor-contenido{flex-grow:1;display:flex;justify-content:center;align-items:center;overflow:hidden;position:relative;}
        .visor-media-img,.visor-media-video{max-width:100%;max-height:100%;object-fit:contain;}
        .visor-interaccion{padding:15px;display:flex;gap:10px;align-items:center;background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);position:absolute;bottom:0;width:100%;box-sizing:border-box;}
        .input-respuesta{flex-grow:1;padding:12px 15px;border-radius:25px;border:1px solid rgba(255,255,255,0.5);background-color:transparent;color:white;}
        .btn-enviar-respuesta{background-color:white;color:black;border:none;border-radius:50%;width:40px;height:40px;font-weight:bold;cursor:pointer;}
        .visor-emojis{display:flex;gap:10px;margin-left:5px;}
        .visor-emoji{font-size:24px;cursor:pointer;}
        .post{background-color:var(--fondo-carta);padding:18px;border-radius:12px;box-shadow:0 2px 8px var(--sombra);margin-bottom:20px;border:1px solid var(--borde);position:relative;}
        .insignia-seguridad{position:absolute;top:-10px;right:10px;background:#00C851;color:white;font-size:10px;font-weight:bold;padding:3px 8px;border-radius:10px;}
        .post-cabecera{display:flex;align-items:center;margin-bottom:12px;gap:12px;}
        .post-avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid var(--color-primario);background-color:var(--color-primario);color:white;display:flex;justify-content:center;align-items:center;font-weight:bold;font-size:18px;}
        .post-autor a{font-weight:bold;color:var(--texto-principal);font-size:16px;text-decoration:none;}
        .post-fecha{font-size:12px;color:var(--texto-secundario);margin-top:2px;}
        .post-texto{color:var(--texto-principal);font-size:16px;line-height:1.5;margin-bottom:10px;white-space:pre-wrap;}
        .post-imagen{max-width:100%;border-radius:8px;margin-top:8px;}
        .post-video{max-width:100%;border-radius:8px;margin-top:8px;outline:none;background-color:#000;}
        .post-3d-model{width:100%;height:320px;border-radius:8px;margin-top:8px;background:linear-gradient(145deg,#e4e6eb,#ffffff);outline:none;cursor:grab;}
        :root[data-theme="dark"] .post-3d-model{background:linear-gradient(145deg,#18191a,#242526);}
        .contenedor-foto-3d{perspective:1000px;width:100%;margin-top:8px;display:flex;justify-content:center;}
        .img-tilt{max-width:100%;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.3);transition:transform 0.1s ease-out;}
        .post.escuadra{background:linear-gradient(145deg,#16161e,#1a1a24);border:2px solid #00ffcc;color:white;}
        .post.escuadra .post-autor a{color:#00ffcc;}
        .post.escuadra .post-texto{color:#e4e6eb;}
        .insignia-juego{background:#00ffcc;color:#16161e;font-size:12px;font-weight:bold;padding:4px 10px;border-radius:20px;display:inline-block;margin-bottom:10px;}
        .slots-contenedor{display:flex;gap:10px;margin-top:15px;margin-bottom:15px;flex-wrap:wrap;}
        .slot{width:45px;height:45px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-weight:bold;font-size:18px;}
        .slot.lleno{border:2px solid #00ffcc;background-color:#1a1a24;color:white;}
        .slot.lleno img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
        .slot.vacio{border:2px dashed #555;color:#555;background:rgba(0,0,0,0.3);}
        .btn-unirse,.btn-salir-escuadra,.btn-lleno{padding:10px 20px;border-radius:8px;font-weight:bold;cursor:pointer;width:100%;font-size:15px;}
        .btn-unirse{background-color:#00ffcc;color:#16161e;border:none;}
        .btn-salir-escuadra{background-color:transparent;border:2px solid #ff4d4d;color:#ff4d4d;}
        .btn-lleno{background-color:#444;color:#888;border:none;cursor:not-allowed;}
        .contenedor-reacciones{position:relative;margin-top:15px;padding-top:12px;border-top:1px solid var(--borde);display:flex;align-items:center;justify-content:space-between;}
        .seccion-izquierda{display:flex;align-items:center;gap:8px;}
        .btn-reaccionar-premium{background-color:var(--fondo);border:1px solid var(--borde);color:var(--texto-secundario);font-weight:bold;cursor:pointer;padding:8px 15px;border-radius:20px;font-size:14px;}
        .menu-emojis{display:none;position:absolute;bottom:50px;left:0;background:var(--fondo-carta);padding:5px 10px;border-radius:30px;box-shadow:0 4px 15px rgba(0,0,0,0.2);gap:10px;z-index:10;border:1px solid var(--borde);}
        .seccion-izquierda:hover .menu-emojis{display:flex;}
        .emoji{cursor:pointer;font-size:26px;}
        .lista-reacciones{font-size:14px;color:var(--texto-secundario);font-weight:bold;background-color:var(--fondo);padding:6px 12px;border-radius:15px;}
        .seccion-derecha-botones{display:flex;gap:8px;}
        .btn-eliminar,.btn-editar{background:none;border:none;font-weight:bold;cursor:pointer;font-size:16px;padding:8px;border-radius:8px;}
        .seccion-comentarios{margin-top:15px;padding-top:15px;border-top:1px solid var(--borde);}
        .comentario{background-color:var(--fondo-comentario);padding:10px 14px;border-radius:16px;margin-bottom:8px;font-size:14px;display:inline-block;max-width:90%;}
        .comentario strong{color:var(--texto-principal);margin-right:5px;}
        .caja-escribir-comentario{display:flex;gap:8px;margin-top:10px;align-items:center;}
        .input-comentario{flex-grow:1;padding:10px 15px;border-radius:20px;border:1px solid var(--borde);background-color:var(--fondo);color:var(--texto-principal);font-size:14px;}
        .btn-enviar-comentario{background-color:var(--color-primario);color:white;border:none;border-radius:50%;width:35px;height:35px;font-weight:bold;cursor:pointer;}
        .btn-borrar-comentario{background:none;border:none;color:#ff4d4d;cursor:pointer;font-size:12px;margin-left:8px;}
    </style>
</head>
<body>
    <div class="barra-superior">
        <h1>Wueychat</h1>
        <div class="contenedor-buscador">
            <span class="icono-lupa">🔍</span>
            <input type="text" id="buscador-muro" class="input-buscador" placeholder="Buscar amigos o notas...">
        </div>
        <div style="display: flex; align-items: center; gap: 5px;">
            <div class="contenedor-campanita">
                <button id="btn-campanita" class="btn-icono">🔔<span id="punto-rojo" class="punto-rojo"></span></button>
                <div id="panel-notificaciones" class="panel-notificaciones"><h4 style="margin:0 0 10px 0;color:var(--color-primario);border-bottom:1px solid var(--borde);padding-bottom:5px;">Tus Alertas</h4><div id="lista-notificaciones"></div></div>
            </div>
            <button id="btn-theme" class="btn-icono">☀️</button>
            <button id="btn-salir-top" class="btn-eliminar-top">Salir</button>
        </div>
    </div>

    <div id="visor-estados" class="visor-estados">
        <div class="visor-barra-progreso"><div class="visor-progreso-lleno" id="barra-progreso"></div></div>
        <div class="visor-cabecera"><div style="display:flex;align-items:center;gap:10px;"><img id="visor-avatar" src="" class="visor-avatar-img"><span id="visor-nombre" class="visor-nombre-texto">Usuario</span></div><button id="btn-cerrar-visor" class="btn-cerrar-visor">✖</button></div>
        <div class="visor-contenido" id="visor-contenido"></div>
        <div class="visor-interaccion" id="visor-interaccion"><input type="text" id="input-respuesta-estado" class="input-respuesta" placeholder="Responder..."><button class="btn-enviar-respuesta" id="btn-enviar-respuesta">➤</button><div class="visor-emojis"><span class="visor-emoji" data-emoji="❤️">❤️</span><span class="visor-emoji" data-emoji="🔥">🔥</span><span class="visor-emoji" data-emoji="😂">😂</span><span class="visor-emoji" data-emoji="😮">😮</span></div></div>
    </div>

    <div id="modal-editar" class="modal-overlay">
        <div class="modal-box">
            <h3>Editar Publicación</h3>
            <textarea id="texto-editar" rows="4" class="input-modal"></textarea>
            <input type="hidden" id="id-post-editar">
            <div style="display:flex;gap:10px;"><button id="btn-cancelar-edicion" class="btn-accion-modal" style="border:1px solid var(--borde);background:transparent;color:var(--texto-principal);">Cancelar</button><button id="btn-guardar-edicion" class="btn-accion-modal" style="background:var(--color-primario);color:white;">Guardar</button></div>
        </div>
    </div>

    <div id="modal-escuadra" class="modal-overlay">
        <div class="modal-box gamer">
            <button class="btn-cerrar-modal" id="btn-cerrar-escuadra">✖</button>
            <h3>🎮 Armar Escuadra</h3>
            <input type="text" id="juego-escuadra" class="input-modal" placeholder="Juego (Ej. Free Fire)">
            <input type="number" id="cupos-escuadra" class="input-modal" min="1" max="10" placeholder="Cupos (Ej. 3)">
            <textarea id="texto-escuadra" rows="3" class="input-modal" placeholder="Misión o reglas..."></textarea>
            <button id="btn-publicar-escuadra" class="btn-accion-modal" style="background:#00ffcc;color:#16161e;width:100%;">Reclutar 🚀</button>
        </div>
    </div>

    <div id="modal-crear-post" class="modal-overlay">
        <div class="modal-box">
            <button class="btn-cerrar-modal" id="btn-cerrar-crear-post">✖</button>
            <h3>Crear publicación</h3>
            <div id="error-publicacion"></div>
            <textarea id="texto-publicacion" placeholder="¿Qué tienes en mente? Usa +rojo o #hashtags"></textarea>
            <div class="opciones-publicacion">
                <div class="opcion-fila"><span>📷 Archivo</span><input type="file" id="archivo-publicacion" accept="image/*,video/*,.glb,.gltf,.gbl"></div>
                <div class="opcion-fila"><label style="display:flex;align-items:center;gap:10px;cursor:pointer;"><input type="checkbox" id="check-foto-3d" class="toggle-3d">🧊 Efecto Foto 3D (Imágenes)</label></div>
            </div>
            <button id="btn-publicar" class="btn-publicar">Publicar Seguro 🔒</button>
            <p id="mensaje-publicando" style="color:var(--color-primario);font-size:14px;display:none;text-align:center;font-weight:bold;margin-top:10px;">Subiendo CALIDAD ORIGINAL... 🚀</p>
        </div>
    </div>

    <div class="contenedor-principal">
        <div class="contenedor-historias" id="barra-historias">
            <div class="historia-item" id="btn-mi-historia"><div class="historia-avatar-contenedor" id="mi-aro-historia"><img id="img-mi-historia" src="" class="historia-avatar" style="display:none;"><div id="letra-mi-historia" class="historia-avatar">?</div></div><div class="btn-agregar-icono">+</div><span class="historia-nombre">Mi Estado</span></div>
            <input type="file" id="archivo-historia" accept="image/*,video/*" style="display:none;">
            <div id="lista-historias-amigos" style="display:flex;gap:15px;"></div>
        </div>
        <p id="mensaje-subiendo-historia" style="color:var(--color-primario);font-size:14px;display:none;text-align:center;font-weight:bold;margin-bottom:15px;">Subiendo magia... ⏳</p>

        <div class="caja-crear-post-falsa" id="trigger-crear-post">
            <img id="img-mini-perfil" src="https://i.ibb.co/Vv0F8sP/default-avatar.png">
            <div class="texto-falso">¿Qué estás pensando?</div>
            <div class="iconos-rapidos"><span title="Foto">🖼️</span><span id="trigger-escuadra-rapido" title="Escuadra" style="color:#00ffcc;">🎮</span></div>
        </div>
        
        <p id="mensaje-no-resultados" style="display:none;text-align:center;font-weight:bold;">No se encontraron resultados 🕵️‍♂️</p>
        <div id="feed"></div>
    </div>

    <div class="barra-inferior">
        <a href="muro.html" class="nav-link activo"><button class="btn-icono activo">🏠</button><span>Inicio</span></a>
        <a href="reels.html" class="nav-link"><button class="btn-icono">🎬</button><span>Videos</span></a>
        <a href="perfil.html" class="nav-link"><button class="btn-icono">👤</button><span>Perfil</span></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, arrayUnion, arrayRemove, getDoc, where, deleteField } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

                            if (tb !== "" && !caja.textContent.toLowerCase().includes(tb)) { caja.style.display = "none"; } 
                            feedDiv.appendChild(caja);

                            if (tipA === "image_3d") { const imgEl = document.getElementById(`tilt-${pId}`); if(imgEl) activarEfectoHolograma(imgEl); }
                        } 
                    } catch (e) {} 
                }); 
            }); 
        }

        // --- TODA LA DELEGACIÓN DE EVENTOS (COMPLETAMENTE ASEGURADA) ---
        document.getElementById("feed").addEventListener("click", async (e) => { 
            // Reacciones
            if (e.target.classList.contains("emoji")) { 
                const pId = e.target.getAttribute("data-id"); const em = e.target.getAttribute("data-emoji"); const au = e.target.getAttribute("data-autor"); 
                const act = {}; act[`reacciones.${llaveUsuarioActual}`] = em; 
                try { await updateDoc(doc(db, "publicaciones", pId), act); if (au !== usuarioActual.email) { await addDoc(collection(db, "notificaciones"), { para: au, de: usuarioActual.email, deNombre: usuarioActual.displayName || "Alguien", tipo: "reaccion", emoji: em, leida: false, fecha: serverTimestamp() }); } } catch (err) {} 
            } 
            // Eliminar Post
            if (e.target.classList.contains("btn-eliminar") || e.target.closest('.btn-eliminar')) { 
                const b = e.target.classList.contains("btn-eliminar") ? e.target : e.target.closest('.btn-eliminar'); const pId = b.getAttribute("data-id"); 
                if (confirm("¿Borrar nota para siempre?")) { try { await deleteDoc(doc(db, "publicaciones", pId)); } catch (err) {} } 
            } 
            // Editar Post
            if (e.target.classList.contains("btn-editar") || e.target.closest('.btn-editar')) { 
                const b = e.target.classList.contains("btn-editar") ? e.target : e.target.closest('.btn-editar'); const pId = b.getAttribute("data-id"); const tR = b.getAttribute("data-raw"); 
                document.getElementById("id-post-editar").value = pId; document.getElementById("texto-editar").value = tR; document.getElementById("modal-editar").style.display = "flex"; 
            } 
            // Borrar Comentario
            if (e.target.classList.contains("btn-borrar-comentario")) { 
                const pId = e.target.getAttribute("data-postid"); const idx = e.target.getAttribute("data-index"); 
                if (confirm("¿Eliminar este comentario?")) { try { const dR = doc(db, "publicaciones", pId); const dS = await getDoc(dR); if (dS.exists()) { const p = dS.data(); await updateDoc(dR, { comentarios: arrayRemove(p.comentarios[idx]) }); } } catch (err) {} } 
            } 
            // Enviar Comentario
            if (e.target.classList.contains("btn-enviar-comentario")) { 
                const pId = e.target.getAttribute("data-id"); const au = e.target.getAttribute("data-autor"); const inp = document.getElementById(`input-comentario-${pId}`); const tC = inp.value.trim(); 
                if (tC !== "") { e.target.disabled = true; try { await updateDoc(doc(db, "publicaciones", pId), { comentarios: arrayUnion({ autor: usuarioActual.email, autorNombre: usuarioActual.displayName || "Usuario", texto: encriptar(tC) }) }); if (au !== usuarioActual.email) { await addDoc(collection(db, "notificaciones"), { para: au, de: usuarioActual.email, deNombre: usuarioActual.displayName || "Alguien", tipo: "comentario", leida: false, fecha: serverTimestamp() }); } inp.value = ""; } catch (err) { alert("Error al comentar."); } finally { e.target.disabled = false; } } 
            } 
            // Unirse Escuadra
            if (e.target.classList.contains("btn-unirse")) { 
                const pId = e.target.getAttribute("data-id"); 
                try { const r = doc(db, "publicaciones", pId); const a = {}; a[`participantes.${llaveUsuarioActual}`] = { nombre: usuarioActual.displayName || "Usuario", foto: usuarioActual.photoURL || null }; await updateDoc(r, a); const dS = await getDoc(r); if(dS.exists()) { const p = dS.data(); await addDoc(collection(db, "notificaciones"), { para: p.autor, de: usuarioActual.email, deNombre: usuarioActual.displayName || "Alguien", tipo: "escuadra", leida: false, fecha: serverTimestamp() }); } } catch(err) {} 
            } 
            // Salir Escuadra
            if (e.target.classList.contains("btn-salir-escuadra")) { 
                const pId = e.target.getAttribute("data-id"); 
                try { const a = {}; a[`participantes.${llaveUsuarioActual}`] = deleteField(); await updateDoc(doc(db, "publicaciones", pId), a); } catch(err) {} 
            } 
        });

        // EVENTOS EXTRA (Enter para comentar, Guardar Edición, Buscar)
        document.getElementById("feed").addEventListener("keypress", (e) => { if (e.key === "Enter" && e.target.classList.contains("input-comentario")) { const pId = e.target.id.replace("input-comentario-", ""); const bE = document.querySelector(`.btn-enviar-comentario[data-id="${pId}"]`); if(bE) bE.click(); } });
        document.getElementById("btn-cancelar-edicion").addEventListener("click", () => document.getElementById("modal-editar").style.display = "none");
        document.getElementById("btn-guardar-edicion").addEventListener("click", async () => { const pId = document.getElementById("id-post-editar").value; const nT = document.getElementById("texto-editar").value.trim(); const bG = document.getElementById("btn-guardar-edicion"); bG.disabled = true; bG.innerText = "Guardando..."; try { await updateDoc(doc(db, "publicaciones", pId), { texto: encriptar(nT) }); document.getElementById("modal-editar").style.display = "none"; } catch (err) {} finally { bG.disabled = false; bG.innerText = "Guardar"; } });
        document.getElementById("buscador-muro").addEventListener("input", (e) => { const tB = e.target.value.toLowerCase(); const nts = document.querySelectorAll(".post"); let nV = 0; nts.forEach(n => { if (n.textContent.toLowerCase().includes(tB)) { n.style.display = "block"; nV++; } else { n.style.display = "none"; } }); document.getElementById("mensaje-no-resultados").style.display = (nV === 0 && tB !== "") ? "block" : "none"; });
    </script>
</body>
</html>
