<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wueychat - Muro Premium</title>
    <style>
        :root[data-theme="light"] {
            --fondo: #f0f2f5; --fondo-carta: #ffffff; --texto-principal: #1c1e21; --texto-secundario: #606770;
            --color-primario: #1877f2; --color-hover: #166fe5; --borde: #dddfe2; --sombra: rgba(0, 0, 0, 0.1);
            --fondo-barra: rgba(255, 255, 255, 0.85); --fondo-comentario: #f0f2f5;
        }
        :root[data-theme="dark"] {
            --fondo: #18191a; --fondo-carta: #242526; --texto-principal: #e4e6eb; --texto-secundario: #b0b3b8;
            --color-primario: #2e89ff; --color-hover: #4e9eff; --borde: #3e4042; --sombra: rgba(0, 0, 0, 0.4);
            --fondo-barra: rgba(36, 37, 38, 0.85); --fondo-comentario: #3a3b3c;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--fondo); color: var(--texto-principal); margin: 0; padding-top: 70px; padding-bottom: 80px; transition: background 0.3s ease; }
        .contenedor-principal { max-width: 600px; margin: 0 auto; padding: 0 15px; overflow-x: hidden; }

        .barra-superior, .barra-inferior { position: fixed; left: 0; width: 100%; box-sizing: border-box; backdrop-filter: blur(8px); background-color: var(--fondo-barra); z-index: 100; border-bottom: 1px solid var(--borde); }
        .barra-superior { top: 0; height: 65px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-shadow: 0 2px 5px var(--sombra); gap: 10px; }
        .barra-superior h1 { color: var(--color-primario); margin: 0; font-size: 22px; font-weight: bold; display: none; }
        
        .contenedor-buscador { flex-grow: 1; max-width: 350px; position: relative; }
        .input-buscador { width: 100%; padding: 10px 15px 10px 35px; border-radius: 20px; border: 1px solid var(--borde); background-color: var(--fondo-carta); color: var(--texto-principal); font-size: 14px; box-sizing: border-box; transition: all 0.2s; }
        .input-buscador:focus { outline: none; border-color: var(--color-primario); box-shadow: 0 0 0 2px rgba(24, 119, 242, 0.2); }
        .icono-lupa { position: absolute; left: 12px; top: 10px; font-size: 14px; color: var(--texto-secundario); }
        @media (min-width: 500px) { .barra-superior h1 { display: block; } }

        .barra-inferior { bottom: 0; height: 70px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--borde); box-shadow: 0 -2px 5px var(--sombra); border-bottom: none; }

        .btn-icono { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--texto-principal); padding: 8px; border-radius: 50%; transition: transform 0.2s ease; }
        .btn-icono:active { transform: scale(0.9); }
        .nav-link { text-decoration: none; color: var(--texto-principal); display: flex; flex-direction: column; align-items: center; font-size: 12px; font-weight: bold; }
        .nav-link.activo .btn-icono { color: var(--color-primario); background-color: rgba(24, 119, 242, 0.1); }
        .btn-eliminar-top { background: none; border: none; color: #ff4d4d; font-weight: bold; cursor: pointer; font-size: 14px; padding: 8px; border-radius: 8px; }

        .contenedor-campanita { position: relative; }
        .punto-rojo { position: absolute; top: 6px; right: 6px; width: 10px; height: 10px; background-color: #ff3b30; border-radius: 50%; border: 2px solid var(--fondo-barra); display: none; }
        .panel-notificaciones { display: none; position: absolute; top: 55px; right: -10px; width: 280px; max-height: 350px; overflow-y: auto; background-color: var(--fondo-carta); border: 1px solid var(--borde); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); padding: 10px; z-index: 200; }
        .noti-item { padding: 12px; border-bottom: 1px solid var(--borde); font-size: 14px; color: var(--texto-principal); border-radius: 8px; margin-bottom: 5px; }
        .noti-item.no-leida { background-color: rgba(24, 119, 242, 0.1); font-weight: bold; }
        .noti-item strong { color: var(--color-primario); }

        /* --- NUEVO: ESTILOS DE ESTADOS EFÍMEROS (STORIES) --- */
        .contenedor-historias { display: flex; gap: 15px; overflow-x: auto; padding: 15px 0 5px 0; margin-bottom: 20px; scrollbar-width: none; }
        .contenedor-historias::-webkit-scrollbar { display: none; }
        .historia-item { display: flex; flex-direction: column; align-items: center; min-width: 75px; cursor: pointer; position: relative; }
        .historia-avatar-contenedor { width: 64px; height: 64px; border-radius: 50%; padding: 3px; background: none; display: flex; justify-content: center; align-items: center; margin-bottom: 5px; transition: transform 0.2s; }
        .historia-avatar-contenedor:active { transform: scale(0.95); }
        .historia-avatar-contenedor.activa { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .historia-avatar { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--fondo); object-fit: cover; background-color: var(--fondo-carta); display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; color: var(--texto-secundario); }
        .historia-nombre { font-size: 12px; color: var(--texto-principal); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 75px; text-align: center; }
        .btn-agregar-icono { position: absolute; bottom: 20px; right: 0; background-color: var(--color-primario); color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; justify-content: center; align-items: center; font-size: 16px; font-weight: bold; border: 3px solid var(--fondo); }

        /* PUBLICACIÓN Y POSTS */
        .contenedor-publicacion { background-color: var(--fondo-carta); padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px var(--sombra); margin-bottom: 25px; border: 1px solid var(--borde); }
        textarea { width: 100%; padding: 12px; border: 1px solid var(--borde); border-radius: 8px; box-sizing: border-box; resize: none; font-size: 16px; background-color: var(--fondo); color: var(--texto-principal); }
        .acciones-publicar { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; gap: 10px; }
        input[type="file"] { font-size: 14px; color: var(--texto-secundario); max-width: 50%; }
        .btn-publicar { background-color: var(--color-primario); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; flex-grow: 1; }

        .post { background-color: var(--fondo-carta); padding: 18px; border-radius: 12px; box-shadow: 0 2px 8px var(--sombra); margin-bottom: 20px; border: 1px solid var(--borde); }
        .post-cabecera { display: flex; align-items: center; margin-bottom: 12px; gap: 12px; }
        .post-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid var(--color-primario); background-color: var(--color-primario); color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; }
        .info-autor { display: flex; flex-direction: column; }
        .post-autor a { font-weight: bold; color: var(--texto-principal); font-size: 16px; text-decoration: none; }
        .post-fecha { font-size: 12px; color: var(--texto-secundario); margin-top: 2px; }
        .post-texto { color: var(--texto-principal); font-size: 16px; line-height: 1.5; margin-bottom: 10px; white-space: pre-wrap; }
        
        .post-imagen { max-width: 100%; border-radius: 8px; margin-top: 8px; box-shadow: 0 2px 5px var(--sombra); }
        .post-video { max-width: 100%; border-radius: 8px; margin-top: 8px; outline: none; background-color: #000; box-shadow: 0 2px 5px var(--sombra); }

        .contenedor-reacciones { position: relative; margin-top: 15px; padding-top: 12px; border-top: 1px solid var(--borde); display: flex; align-items: center; justify-content: space-between; }
        .seccion-izquierda { display: flex; align-items: center; gap: 8px; }
        .btn-reaccionar-premium { background-color: var(--fondo); border: 1px solid var(--borde); color: var(--texto-secundario); font-weight: bold; cursor: pointer; padding: 8px 15px; border-radius: 20px; font-size: 14px; }
        .menu-emojis { display: none; position: absolute; bottom: 50px; left: 0; background: var(--fondo-carta); padding: 5px 10px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); gap: 10px; z-index: 10; border: 1px solid var(--borde); }
        .seccion-izquierda:hover .menu-emojis { display: flex; }
        .emoji { cursor: pointer; font-size: 26px; }
        .lista-reacciones { font-size: 14px; color: var(--texto-secundario); font-weight: bold; background-color: var(--fondo); padding: 6px 12px; border-radius: 15px; }
        .btn-eliminar { background: none; border: none; color: #ff4d4d; font-weight: bold; cursor: pointer; font-size: 14px; padding: 8px 12px; }

        .seccion-comentarios { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--borde); }
        .comentario { background-color: var(--fondo-comentario); padding: 10px 14px; border-radius: 16px; margin-bottom: 8px; font-size: 14px; display: inline-block; max-width: 90%; }
        .comentario strong { color: var(--texto-principal); margin-right: 5px; }
        .caja-escribir-comentario { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
        .input-comentario { flex-grow: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid var(--borde); background-color: var(--fondo); color: var(--texto-principal); font-size: 14px; }
        .btn-enviar-comentario { background-color: var(--color-primario); color: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div class="barra-superior">
        <h1>Wueychat</h1>
        <div class="contenedor-buscador">
            <span class="icono-lupa">🔍</span>
            <input type="text" id="buscador-muro" class="input-buscador" placeholder="Buscar amigos o notas...">
        </div>
        <div style="display: flex; align-items: center; gap: 5px;">
            <div class="contenedor-campanita">
                <button id="btn-campanita" class="btn-icono">🔔<span id="punto-rojo" class="punto-rojo"></span></button>
                <div id="panel-notificaciones" class="panel-notificaciones">
                    <h4 style="margin: 0 0 10px 0; color: var(--color-primario); border-bottom: 1px solid var(--borde); padding-bottom: 5px;">Tus Alertas</h4>
                    <div id="lista-notificaciones">Cargando avisos...</div>
                </div>
            </div>
            <button id="btn-theme" class="btn-icono">☀️</button>
            <button id="btn-salir-top" class="btn-eliminar-top">Salir</button>
        </div>
    </div>

    <div class="contenedor-principal">
        
        <div class="contenedor-historias" id="barra-historias">
            <div class="historia-item" id="btn-mi-historia">
                <div class="historia-avatar-contenedor" id="mi-aro-historia">
                    <img id="img-mi-historia" src="" class="historia-avatar" style="display:none;">
                    <div id="letra-mi-historia" class="historia-avatar">?</div>
                </div>
                <div class="btn-agregar-icono">+</div>
                <span class="historia-nombre">Mi Estado</span>
            </div>
            <input type="file" id="archivo-historia" accept="image/*,video/*" style="display: none;">
            
            <div id="lista-historias-amigos" style="display: flex; gap: 15px;"></div>
        </div>
        <p id="mensaje-subiendo-historia" style="color: var(--color-primario); font-size: 14px; display: none; text-align: center; margin-bottom: 15px; font-weight: bold;">Subiendo estado (Se borrará en 24h)... ⏳</p>

        <div class="contenedor-publicacion">
            <textarea id="texto-publicacion" rows="3" placeholder="¿Qué tienes en mente?"></textarea>
            <div class="acciones-publicar">
                <input type="file" id="archivo-publicacion" accept="image/*,video/*">
                <button id="btn-publicar" class="btn-publicar">Publicar</button>
            </div>
            <p id="mensaje-publicando" style="color: var(--color-primario); font-size: 14px; display: none; text-align: center; margin-top: 10px; font-weight: bold;">Subiendo archivo... 🚀</p>
        </div>
        
        <p id="mensaje-no-resultados" style="display: none; text-align: center; color: var(--texto-secundario); font-weight: bold; margin-top: 30px;">No se encontraron resultados 🕵️‍♂️</p>
        
        <div id="feed"></div>
    </div>

    <div class="barra-inferior">
        <a href="muro.html" class="nav-link activo"><button class="btn-icono activo">🏠</button><span>Inicio</span></a>
        <a href="perfil.html" class="nav-link"><button class="btn-icono">👤</button><span>Perfil</span></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, arrayUnion, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdh-HJHC5dbC7GrLrB6pHd6XGZAirNLcM",
            authDomain: "wueychat.firebaseapp.com",
            projectId: "wueychat",
            storageBucket: "wueychat.firebasestorage.app",
            messagingSenderId: "889745387297",
            appId: "1:889745387297:web:1b8343a328d854fc99d860",
            measurementId: "G-LKQ86ZXTRK"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // NUBES
        const IMGBB_API_KEY = "f1ec2e833cbb9f022415d2fa76f8740f"; 
        const CLOUDINARY_CLOUD_NAME = "dizktanb9"; 
        const CLOUDINARY_UPLOAD_PRESET = "wueychat_media"; 

        let usuarioActual = null;
        let llaveUsuarioActual = "anonimo";

        const btnTheme = document.getElementById('btn-theme');
        const html = document.documentElement;
        let temaGuardado = 'light';
        try { temaGuardado = localStorage.getItem('theme') || 'light'; } catch(e) {}
        html.setAttribute('data-theme', temaGuardado);
        btnTheme.innerText = temaGuardado === 'light' ? '☀️' : '🌙';

        btnTheme.addEventListener('click', () => {
            const nuevoTema = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', nuevoTema);
            try { localStorage.setItem('theme', nuevoTema); } catch(e) {}
            btnTheme.innerText = nuevoTema === 'light' ? '☀️' : '🌙';
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                usuarioActual = user;
                if(user.email) llaveUsuarioActual = user.email.replace(/\./g, '_'); 
                
                // Poner mi foto en el botón de "Mi Estado"
                const nombreMostrar = user.displayName || "Yo";
                if(user.photoURL) {
                    document.getElementById("letra-mi-historia").style.display = "none";
                    document.getElementById("img-mi-historia").src = user.photoURL;
                    document.getElementById("img-mi-historia").style.display = "block";
                } else {
                    document.getElementById("letra-mi-historia").innerText = nombreMostrar.charAt(0).toUpperCase();
                }

                cargarPublicaciones();
                escucharNotificaciones();
                escucharHistorias(); // <--- Inicia la magia del Reloj de Arena
            } else {
                window.location.href = "index.html";
            }
        });

        document.getElementById("btn-salir-top").addEventListener("click", () => signOut(auth));

        // --- MAGIA DE LOS ESTADOS EFÍMEROS ---
        
        // 1. Botón para abrir galería y subir estado
        document.getElementById("btn-mi-historia").addEventListener("click", () => {
            document.getElementById("archivo-historia").click();
        });

        // 2. Subir el Estado a la colección "estados"
        document.getElementById("archivo-historia").addEventListener("change", async (e) => {
            const archivoMedia = e.target.files[0];
            if (!archivoMedia) return;

            document.getElementById("mensaje-subiendo-historia").style.display = "block";
            let urlFinal = null;
            let tipoFinal = null;

            try {
                if (archivoMedia.type.startsWith("image/")) {
                    const formData = new FormData(); formData.append("image", archivoMedia);
                    const respuestaImgbb = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                    const datosImgbb = await respuestaImgbb.json();
                    if (datosImgbb.success) { urlFinal = datosImgbb.data.url; tipoFinal = "image"; } else throw new Error();
                } 
                else if (archivoMedia.type.startsWith("video/")) {
                    const formData = new FormData(); formData.append("file", archivoMedia); formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
                    const urlCloudinary = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/video/upload`;
                    const respuesta = await fetch(urlCloudinary, { method: "POST", body: formData });
                    const datos = await respuesta.json();
                    if (datos.secure_url) { urlFinal = datos.secure_url; tipoFinal = "video"; } else throw new Error();
                }

                // Guardar en Firebase (Colección nueva: estados)
                await addDoc(collection(db, "estados"), {
                    autor: usuarioActual.email, 
                    autorNombre: usuarioActual.displayName || "Usuario", 
                    autorFoto: usuarioActual.photoURL || null, 
                    mediaUrl: urlFinal, 
                    mediaType: tipoFinal, 
                    fecha: serverTimestamp() // El reloj comienza a correr AHORA
                });
                
                e.target.value = ""; // Limpiar el input
            } catch (error) {
                console.error(error); alert("Hubo un error al subir tu estado.");
            } finally {
                document.getElementById("mensaje-subiendo-historia").style.display = "none";
            }
        });

        // 3. Escuchar los estados en tiempo real (y filtrar los de hace +24h)
        function escucharHistorias() {
            const qHistorias = query(collection(db, "estados"), orderBy("fecha", "asc"));
            
            onSnapshot(qHistorias, (snapshot) => {
                const contenedorAmigos = document.getElementById("lista-historias-amigos");
                contenedorAmigos.innerHTML = "";
                const ahora = new Date().getTime();
                const historiasActivas = {}; 

                snapshot.forEach(docSnap => {
                    const estado = docSnap.data();
                    if (estado.fecha) {
                        const tiempoEstado = estado.fecha.toMillis();
                        const diferenciaHoras = (ahora - tiempoEstado) / (1000 * 60 * 60);
                        
                         // EL RELOJ DE ARENA: Solo pasan los estados de menos de 24 horas
                        if (diferenciaHoras < 24) {
                            if (!historiasActivas[estado.autor]) {
                                historiasActivas[estado.autor] = {
                                    autor: estado.autor, autorNombre: estado.autorNombre, autorFoto: estado.autorFoto, estados: []
                                };
                            }
                            historiasActivas[estado.autor].estados.push(estado);
                        }
                    }
                });

                // Reiniciar mi aro por si mis estados ya vencieron
                document.getElementById("mi-aro-historia").classList.remove("activa");

                // Dibujar circulitos VIP
                Object.values(historiasActivas).forEach(usuario => {
                    if (usuario.autor !== usuarioActual.email) {
                        const item = document.createElement("div");
                        item.className = "historia-item";
                        let avatar = usuario.autorFoto ? `<img src="${usuario.autorFoto}" class="historia-avatar">` : `<div class="historia-avatar">${usuario.autorNombre.charAt(0).toUpperCase()}</div>`;
                        
                        item.innerHTML = `
                            <div class="historia-avatar-contenedor activa">
                                ${avatar}
                            </div>
                            <span class="historia-nombre">${usuario.autorNombre.split(" ")[0]}</span>
                        `;
                        contenedorAmigos.appendChild(item);
                    } else {
                        // Si yo tengo estados vivos, encender mi aro de colores
                        document.getElementById("mi-aro-historia").classList.add("activa");
                    }
                });
            });
        }


        // --- CÓDIGO VIEJO (NO SE TOCÓ) ---
        document.getElementById("buscador-muro").addEventListener("input", (e) => {
            const textoBuscado = e.target.value.toLowerCase(); const todasLasNotas = document.querySelectorAll(".post"); let notasVisibles = 0;
            todasLasNotas.forEach(nota => { const contenidoNota = nota.textContent.toLowerCase(); if (contenidoNota.includes(textoBuscado)) { nota.style.display = "block"; notasVisibles++; } else { nota.style.display = "none"; } });
            document.getElementById("mensaje-no-resultados").style.display = (notasVisibles === 0 && textoBuscado !== "") ? "block" : "none";
        });

        function escucharNotificaciones() {
            const qNoti = query(collection(db, "notificaciones"), where("para", "==", usuarioActual.email));
            onSnapshot(qNoti, (snapshot) => {
                const listaDiv = document.getElementById("lista-notificaciones"); const puntoRojo = document.getElementById("punto-rojo");
                listaDiv.innerHTML = ""; let noLeidas = 0; let notis = [];
                snapshot.forEach(docSnap => { const noti = docSnap.data(); noti.id = docSnap.id; if(noti.fecha) { notis.push(noti); } if (!noti.leida) noLeidas++; });
                notis.sort((a, b) => b.fecha.toMillis() - a.fecha.toMillis()); puntoRojo.style.display = noLeidas > 0 ? "block" : "none";
                if (notis.length === 0) { listaDiv.innerHTML = "<p style='color: var(--texto-secundario); text-align: center; font-size: 14px;'>No tienes alertas nuevas.</p>"; return; }
                notis.forEach(noti => {
                    const item = document.createElement("div"); item.className = `noti-item ${noti.leida ? '' : 'no-leida'}`; item.dataset.id = noti.id;
                    let texto = ""; if (noti.tipo === "reaccion") texto = `A <strong>${noti.deNombre}</strong> le gustó tu nota.`; if (noti.tipo === "comentario") texto = `<strong>${noti.deNombre}</strong> comentó tu publicación.`; item.innerHTML = texto; listaDiv.appendChild(item);
                });
            });
        }

        document.getElementById("btn-campanita").addEventListener("click", (e) => {
            e.stopPropagation(); const panel = document.getElementById("panel-notificaciones"); panel.style.display = panel.style.display === "block" ? "none" : "block";
            if (panel.style.display === "block") {
                document.querySelectorAll(".noti-item.no-leida").forEach(async (item) => { try { await updateDoc(doc(db, "notificaciones", item.dataset.id), { leida: true }); } catch(err){} });
            }
        });

        const btnPublicar = document.getElementById("btn-publicar");
        btnPublicar.addEventListener("click", async () => {
            const texto = document.getElementById("texto-publicacion").value.trim(); const archivoMedia = document.getElementById("archivo-publicacion").files[0];
            if (texto === "" && !archivoMedia) return;
            btnPublicar.disabled = true; document.getElementById("mensaje-publicando").style.display = "block";
            let urlFinal = null; let tipoFinal = null;
            try {
                if (archivoMedia) {
                    if (archivoMedia.type.startsWith("image/")) {
                        const formData = new FormData(); formData.append("image", archivoMedia); const respuestaImgbb = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData }); const datosImgbb = await respuestaImgbb.json(); if (datosImgbb.success) { urlFinal = datosImgbb.data.url; tipoFinal = "image"; } else throw new Error();
                    } else if (archivoMedia.type.startsWith("video/")) {
                        const formData = new FormData(); formData.append("file", archivoMedia); formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET); const urlCloudinary = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/video/upload`; const respuesta = await fetch(urlCloudinary, { method: "POST", body: formData }); const datos = await respuesta.json(); if (datos.secure_url) { urlFinal = datos.secure_url; tipoFinal = "video"; } else throw new Error();
                    }
                }
                await addDoc(collection(db, "publicaciones"), {
                    autor: usuarioActual.email, autorNombre: usuarioActual.displayName || "Usuario", autorFoto: usuarioActual.photoURL || null, texto: texto, mediaUrl: urlFinal, mediaType: tipoFinal, imagenUrl: (tipoFinal === "image") ? urlFinal : null, fecha: serverTimestamp(), reacciones: {}, comentarios: []
                });
                document.getElementById("texto-publicacion").value = ""; document.getElementById("archivo-publicacion").value = "";
            } catch (error) { console.error(error); alert("Error al subir la publicación."); } finally { btnPublicar.disabled = false; document.getElementById("mensaje-publicando").style.display = "none"; }
        });

        function cargarPublicaciones() {
            const feedDiv = document.getElementById("feed"); const q = query(collection(db, "publicaciones"), orderBy("fecha", "desc"));
            onSnapshot(q, (snapshot) => {
                feedDiv.innerHTML = ""; const textoBuscadoActual = document.getElementById("buscador-muro").value.toLowerCase();
                snapshot.forEach((documentoFirebase) => {
                    try {
                        const post = documentoFirebase.data(); const postId = documentoFirebase.id; 
                        if (post.fecha) {
                            const cajaPost = document.createElement("div"); cajaPost.classList.add("post"); const nombreMostrar = post.autorNombre ? post.autorNombre : post.autor; const fText = post.fecha.toDate().toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }) + " " + post.fecha.toDate().toLocaleTimeString('es-ES', { hour: '2-digit', minute:'2-digit' });
                            let avatarHTML = post.autorFoto ? `<img src="${post.autorFoto}" class="post-avatar">` : `<div class="post-avatar">${nombreMostrar.charAt(0).toUpperCase()}</div>`;
                            let htmlContenido = `<div class="post-cabecera">${avatarHTML}<div class="info-autor"><div class="post-autor"><a href="perfil_publico.html?usuario=${post.autor}">${nombreMostrar}</a></div><div class="post-fecha">${fText}</div></div></div>`;
                            if (post.texto) htmlContenido += `<div class="post-texto">${post.texto}</div>`;
                            const urlArchivo = post.mediaUrl || post.imagenUrl; const tipoArchivo = post.mediaType || (post.imagenUrl ? "image" : null);
                            if (urlArchivo) { if (tipoArchivo === "video") { htmlContenido += `<video src="${urlArchivo}" class="post-video" controls preload="metadata"></video>`; } else { htmlContenido += `<img src="${urlArchivo}" class="post-imagen">`; } }
                            const reacciones = post.reacciones || {}; const conteoEmojis = {}; let miReaccionActual = null; for (const [correo, emoji] of Object.entries(reacciones)) { conteoEmojis[emoji] = (conteoEmojis[emoji] || 0) + 1; if (correo === llaveUsuarioActual) miReaccionActual = emoji; } const textoReacciones = Object.entries(conteoEmojis).map(([e, total]) => `${e} ${total}`).join('   '); let botonEliminarHTML = post.autor === usuarioActual.email ? `<button class="btn-eliminar" data-id="${postId}">🗑️</button>` : "";
                            htmlContenido += `<div class="contenedor-reacciones"><div class="seccion-izquierda"><button class="btn-reaccionar-premium">${miReaccionActual ? miReaccionActual : '👍'}</button><div class="menu-emojis"><span class="emoji" data-id="${postId}" data-emoji="👍" data-autor="${post.autor}">👍</span><span class="emoji" data-id="${postId}" data-emoji="❤️" data-autor="${post.autor}">❤️</span><span class="emoji" data-id="${postId}" data-emoji="😂" data-autor="${post.autor}">😂</span><span class="emoji" data-id="${postId}" data-emoji="😮" data-autor="${post.autor}">😮</span><span class="emoji" data-id="${postId}" data-emoji="😢" data-autor="${post.autor}">😢</span></div>${textoReacciones ? `<div class="lista-reacciones">${textoReacciones}</div>` : ''}</div>${botonEliminarHTML}</div>`;
                            let htmlComentarios = `<div class="seccion-comentarios">`; if (post.comentarios && post.comentarios.length > 0) { post.comentarios.forEach(comentario => { htmlComentarios += `<div style="margin-bottom: 5px;"><div class="comentario"><strong><a href="perfil_publico.html?usuario=${comentario.autor}" style="color: inherit; text-decoration: none;">${comentario.autorNombre}</a>:</strong> ${comentario.texto}</div></div>`; }); } htmlComentarios += `<div class="caja-escribir-comentario"><input type="text" class="input-comentario" id="input-comentario-${postId}" placeholder="Escribe un comentario..."><button class="btn-enviar-comentario" data-id="${postId}" data-autor="${post.autor}">➤</button></div></div>`;
                            htmlContenido += htmlComentarios; cajaPost.innerHTML = htmlContenido; 
                            if (textoBuscadoActual !== "" && !cajaPost.textContent.toLowerCase().includes(textoBuscadoActual)) { cajaPost.style.display = "none"; } feedDiv.appendChild(cajaPost);
                        }
                    } catch (errorPost) {}
                });
            });
        }

        document.getElementById("feed").addEventListener("click", async (e) => {
            if (e.target.classList.contains("emoji")) {
                const postId = e.target.getAttribute("data-id"); const emojiElegido = e.target.getAttribute("data-emoji"); const autorDelPost = e.target.getAttribute("data-autor");
                const ref = doc(db, "publicaciones", postId); const act = {}; act[`reacciones.${llaveUsuarioActual}`] = emojiElegido;
                try { await updateDoc(ref, act); if (autorDelPost !== usuarioActual.email) { await addDoc(collection(db, "notificaciones"), { para: autorDelPost, de: usuarioActual.email, deNombre: usuarioActual.displayName || "Alguien", tipo: "reaccion", emoji: emojiElegido, leida: false, fecha: serverTimestamp() }); } } catch (err) { console.error(err); }
            }
            if (e.target.classList.contains("btn-eliminar")) { const postId = e.target.getAttribute("data-id"); if (confirm("¿Borrar nota para siempre?")) { try { await deleteDoc(doc(db, "publicaciones", postId)); } catch (err) { console.error(err); } } }
            if (e.target.classList.contains("btn-enviar-comentario")) {
                const postId = e.target.getAttribute("data-id"); const autorDelPost = e.target.getAttribute("data-autor"); const inputElemento = document.getElementById(`input-comentario-${postId}`); const textoComentario = inputElemento.value.trim();
                if (textoComentario !== "") {
                    e.target.disabled = true;
                    try { const ref = doc(db, "publicaciones", postId); const nuevoComentario = { autor: usuarioActual.email, autorNombre: usuarioActual.displayName || "Usuario", texto: textoComentario }; await updateDoc(ref, { comentarios: arrayUnion(nuevoComentario) });
                        if (autorDelPost !== usuarioActual.email) { await addDoc(collection(db, "notificaciones"), { para: autorDelPost, de: usuarioActual.email, deNombre: usuarioActual.displayName || "Alguien", tipo: "comentario", leida: false, fecha: serverTimestamp() }); } inputElemento.value = ""; 
                    } catch (err) { alert("Error al comentar."); } finally { e.target.disabled = false; }
                }
            }
        });
        
        document.getElementById("feed").addEventListener("keypress", async (e) => { if (e.key === "Enter" && e.target.classList.contains("input-comentario")) { const postId = e.target.id.replace("input-comentario-", ""); const btnEnviar = document.querySelector(`.btn-enviar-comentario[data-id="${postId}"]`); if(btnEnviar) btnEnviar.click(); } });
    </script>
</body>
</html>
