<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wueychat - Mi Perfil VIP</title>
    <style>
        :root[data-theme="light"] {
            --fondo: #f0f2f5; --fondo-carta: #ffffff; --texto-principal: #1c1e21; --texto-secundario: #606770;
            --color-primario: #1877f2; --color-hover: #166fe5; --borde: #dddfe2; --sombra: rgba(0, 0, 0, 0.1);
            --fondo-barra: rgba(255, 255, 255, 0.85);
        }
        :root[data-theme="dark"] {
            --fondo: #18191a; --fondo-carta: #242526; --texto-principal: #e4e6eb; --texto-secundario: #b0b3b8;
            --color-primario: #2e89ff; --color-hover: #4e9eff; --borde: #3e4042; --sombra: rgba(0, 0, 0, 0.4);
            --fondo-barra: rgba(36, 37, 38, 0.85);
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--fondo); color: var(--texto-principal); margin: 0; padding-top: 70px; padding-bottom: 80px; transition: background 0.3s ease; }
        .contenedor-principal { max-width: 600px; margin: 0 auto; padding: 0 15px; }

        .barra-superior, .barra-inferior { position: fixed; left: 0; width: 100%; box-sizing: border-box; backdrop-filter: blur(8px); background-color: var(--fondo-barra); z-index: 100; border: 1px solid var(--borde); }
        .barra-superior { top: 0; height: 65px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-shadow: 0 2px 5px var(--sombra); border-bottom: 1px solid var(--borde); }
        .barra-superior h1 { color: var(--color-primario); margin: 0; font-size: 26px; font-weight: bold; }
        .barra-inferior { bottom: 0; height: 70px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--borde); box-shadow: 0 -2px 5px var(--sombra); border-bottom: none; }

        .btn-icono { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--texto-principal); padding: 10px; border-radius: 50%; transition: transform 0.2s ease; }
        .btn-icono:active { transform: scale(0.9); }
        .nav-link { text-decoration: none; color: var(--texto-principal); display: flex; flex-direction: column; align-items: center; font-size: 12px; font-weight: bold; }
        .nav-link.activo .btn-icono { color: var(--color-primario); background-color: rgba(24, 119, 242, 0.1); }

        /* CABECERA CON PORTADA */
        .cabecera-perfil { background-color: var(--fondo-carta); border-radius: 16px; box-shadow: 0 4px 12px var(--sombra); text-align: center; margin-bottom: 25px; border: 1px solid var(--borde); overflow: hidden; position: relative; }
        .portada-img { width: 100%; height: 180px; object-fit: cover; background-color: var(--color-primario); display: block; border-bottom: 1px solid var(--borde); }
        .contenedor-avatar { position: relative; display: inline-block; margin-top: -65px; margin-bottom: 10px; }
        .avatar-img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 5px solid var(--fondo-carta); box-shadow: 0 2px 8px var(--sombra); background-color: var(--fondo-carta); }
        .avatar-letra { width: 130px; height: 130px; background-color: var(--color-primario); color: white; border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; font-size: 60px; font-weight: bold; border: 5px solid var(--fondo-carta); box-shadow: 0 2px 8px var(--sombra); }
        
        .info-usuario { padding: 0 20px 25px 20px; }
        .nombre-perfil { font-size: 26px; color: var(--texto-principal); font-weight: 800; margin: 0; }
        .bio-perfil { color: var(--texto-principal); font-size: 15px; margin: 12px auto; max-width: 80%; line-height: 1.4; font-style: italic; }
        .datos-extra { color: var(--texto-secundario); font-size: 14px; margin-top: 5px; font-weight: bold; }

        /* NUEVO: ESTADÍSTICAS EN TU PERFIL */
        .estadisticas-seguidores { display: flex; justify-content: center; gap: 20px; margin: 15px 0; font-size: 16px; color: var(--texto-principal); }
        .estadisticas-seguidores span { font-weight: bold; color: var(--color-primario); font-size: 18px; }
        
        .botones-accion { margin-top: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-compartir { background-color: #42b72a; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-editar { background-color: var(--fondo); color: var(--texto-principal); border: 1px solid var(--borde); padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        /* CONFIGURACIÓN */
        .panel-configuracion { display: none; background-color: var(--fondo-carta); padding: 25px; border-radius: 16px; box-shadow: 0 4px 12px var(--sombra); margin-bottom: 25px; border: 1px solid var(--borde); border-top: 4px solid var(--color-primario); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; color: var(--texto-principal); margin-bottom: 5px; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid var(--borde); border-radius: 8px; box-sizing: border-box; font-size: 15px; background-color: var(--fondo); color: var(--texto-principal); font-family: inherit; }
        .form-group textarea { resize: none; }
        .btn-guardar { background-color: var(--color-primario); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 16px; }

        .titulo-seccion { color: var(--texto-secundario); font-size: 18px; margin-bottom: 15px; font-weight: bold; }
        .post { background-color: var(--fondo-carta); padding: 18px; border-radius: 12px; box-shadow: 0 2px 8px var(--sombra); margin-bottom: 20px; border: 1px solid var(--borde); }
        .post-fecha { font-size: 12px; color: var(--texto-secundario); margin-bottom: 10px; display: block; font-weight: bold; }
        .post-texto { color: var(--texto-principal); font-size: 16px; line-height: 1.5; margin-bottom: 10px; }
        .post-imagen { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        .contenedor-acciones-post { border-top: 1px solid var(--borde); margin-top: 12px; padding-top: 10px; text-align: right; }
        .btn-eliminar { background: none; border: none; color: #ff4d4d; font-weight: bold; cursor: pointer; font-size: 14px; padding: 5px 10px; }
    </style>
</head>
<body>

    <div class="barra-superior">
        <h1>Wueychat</h1>
        <button id="btn-theme" class="btn-icono">☀️</button>
    </div>

    <div class="contenedor-principal">
        <div class="cabecera-perfil">
            <img id="portada-visual" class="portada-img" src="" alt="Portada" style="display: none;">
            <div id="portada-color" class="portada-img"></div>

            <div class="info-usuario">
                <div class="contenedor-avatar">
                    <img id="avatar-img" class="avatar-img" style="display: none;" src="" alt="Avatar">
                    <div class="avatar-letra" id="avatar-letra">U</div>
                </div>
                
                <h2 class="nombre-perfil" id="nombre-perfil-texto">Cargando...</h2>
                <p class="bio-perfil" id="bio-perfil-texto">Sin biografía aún. ¡Cuéntale al mundo sobre ti!</p>
                <div class="datos-extra" id="datos-perfil">Cargando datos...</div>
                
                <div class="estadisticas-seguidores">
                    <div><span id="mi-contador-seguidores">0</span> Seguidores</div>
                    <div><span id="mi-contador-seguidos">0</span> Seguidos</div>
                </div>
                
                <div class="botones-accion">
                    <button id="btn-abrir-config" class="btn-editar">⚙️ Editar Perfil</button>
                    <button id="btn-compartir" class="btn-compartir">🔗 Compartir</button>
                </div>
            </div>
        </div>

        <div class="panel-configuracion" id="panel-config">
            <h3 style="margin-top:0; color: var(--color-primario);">Edita tu perfil</h3>
            <div class="form-group"><label>🖼️ Foto de Portada (Fondo)</label><input type="file" id="input-portada" accept="image/*"></div>
            <div class="form-group"><label>👤 Foto de Perfil (Circulito)</label><input type="file" id="input-foto" accept="image/*"></div>
            <div class="form-group"><label>Tu Nombre</label><input type="text" id="input-nombre" placeholder="Ej: Adriano"></div>
            <div class="form-group"><label>📝 Biografía (Breve)</label><textarea id="input-bio" rows="2" placeholder="Ej: Me encanta jugar y programar..."></textarea></div>
            <div class="form-group" style="display: flex; gap: 10px;">
                <div style="flex: 1;"><label>Género</label><select id="input-genero"><option value="No especificado">Oculto</option><option value="Hombre">Hombre</option><option value="Mujer">Mujer</option></select></div>
                <div style="flex: 1;"><label>Edad</label><input type="number" id="input-edad" placeholder="Ej: 20"></div>
            </div>
            <p id="mensaje-guardando" style="color: var(--color-primario); display: none; text-align: center; font-weight: bold;">Guardando magia...</p>
            <button id="btn-guardar-perfil" class="btn-guardar">Guardar Cambios</button>
        </div>

        <h3 class="titulo-seccion">Tus Publicaciones</h3>
        <div id="mis-publicaciones"></div>
    </div>

    <div class="barra-inferior">
        <a href="muro.html" class="nav-link"><button class="btn-icono">🏠</button><span>Inicio</span></a>
        <a href="perfil.html" class="nav-link activo"><button class="btn-icono activo">👤</button><span>Mi Perfil</span></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdh-HJHC5dbC7GrLrB6pHd6XGZAirNLcM",
            authDomain: "wueychat.firebaseapp.com",
            projectId: "wueychat",
            storageBucket: "wueychat.firebasestorage.app",
            messagingSenderId: "889745387297",
            appId: "1:889745387297:web:1b8343a328d854fc99d860",
            measurementId: "G-LKQ86ZXTRK"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const IMGBB_API_KEY = "f1ec2e833cbb9f022415d2fa76f8740f";

        let usuarioActual = null;

        const btnTheme = document.getElementById('btn-theme');
        const html = document.documentElement;
        try { html.setAttribute('data-theme', localStorage.getItem('theme') || 'light'); } catch(e){}
        btnTheme.innerText = html.getAttribute('data-theme') === 'light' ? '☀️' : '🌙';
        btnTheme.addEventListener('click', () => {
            const nuevoTema = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', nuevoTema);
            try { localStorage.setItem('theme', nuevoTema); } catch(e){}
            btnTheme.innerText = nuevoTema === 'light' ? '☀️' : '🌙';
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                usuarioActual = user;
                cargarDatosPerfil(user);
                cargarMisPublicaciones(user.email);
            } else {
                window.location.href = "index.html";
            }
        });

        document.getElementById("btn-abrir-config").addEventListener("click", () => {
            const panel = document.getElementById("panel-config");
            panel.style.display = panel.style.display === "block" ? "none" : "block";
        });

        document.getElementById("btn-compartir").addEventListener("click", async () => {
            const datos = { title: 'Wueychat', text: '¡Mira mi perfil en Wueychat!', url: 'https://theadrianomx.github.io/wueychat-web/' };
            if (navigator.share) { try { await navigator.share(datos); } catch (err) {} }
            else { navigator.clipboard.writeText(datos.url); alert("¡Enlace copiado!"); }
        });

        async function cargarDatosPerfil(user) {
            const nombreMostrado = user.displayName || "Usuario sin nombre";
            document.getElementById("nombre-perfil-texto").innerText = nombreMostrado;
            document.getElementById("input-nombre").value = user.displayName || "";

            if (user.photoURL) {
                document.getElementById("avatar-letra").style.display = "none";
                const img = document.getElementById("avatar-img");
                img.src = user.photoURL; img.style.display = "inline-flex";
            } else {
                document.getElementById("avatar-letra").innerText = nombreMostrado.charAt(0).toUpperCase();
            }

            // NUEVO: Escuchar mi propio documento de Firebase en tiempo real para mis estadísticas
            onSnapshot(doc(db, "usuarios", user.email), (docSnap) => {
                if(docSnap.exists()) {
                    const datos = docSnap.data();
                    
                    if(datos.biografia) {
                        document.getElementById("bio-perfil-texto").innerText = `"${datos.biografia}"`;
                        document.getElementById("input-bio").value = datos.biografia;
                    }
                    if(datos.portadaUrl) {
                        document.getElementById("portada-color").style.display = "none";
                        document.getElementById("portada-visual").src = datos.portadaUrl;
                        document.getElementById("portada-visual").style.display = "block";
                    }
                    document.getElementById("datos-perfil").innerText = `${user.email} • ${datos.genero || 'Oculto'} • ${datos.edad ? datos.edad + ' años' : 'Edad oculta'}`;
                    if(datos.genero) document.getElementById("input-genero").value = datos.genero;
                    if(datos.edad) document.getElementById("input-edad").value = datos.edad;

                    // Actualizar mis contadores de seguidores
                    const misSeguidores = datos.seguidores || [];
                    const misSeguidos = datos.siguiendo || [];
                    document.getElementById("mi-contador-seguidores").innerText = misSeguidores.length;
                    document.getElementById("mi-contador-seguidos").innerText = misSeguidos.length;
                } else {
                    document.getElementById("datos-perfil").innerText = `${user.email}`;
                }
            });
        }

        document.getElementById("btn-guardar-perfil").addEventListener("click", async () => {
            const btn = document.getElementById("btn-guardar-perfil");
            const msj = document.getElementById("mensaje-guardando");
            const archivoFoto = document.getElementById("input-foto").files[0];
            const archivoPortada = document.getElementById("input-portada").files[0]; 
            
            btn.disabled = true; msj.style.display = "block";

            try {
                let urlFoto = usuarioActual.photoURL;
                if (archivoFoto) {
                    const formData = new FormData(); formData.append("image", archivoFoto);
                    const resp = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                    const datos = await resp.json();
                    if (datos.success) urlFoto = datos.data.url;
                }

                let urlPortadaNueva = null;
                if (archivoPortada) {
                    const formPortada = new FormData(); formPortada.append("image", archivoPortada);
                    const respPort = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formPortada });
                    const datosPort = await respPort.json();
                    if (datosPort.success) urlPortadaNueva = datosPort.data.url;
                }

                const docViejo = await getDoc(doc(db, "usuarios", usuarioActual.email));
                let portadaFinal = urlPortadaNueva;
                if(!portadaFinal && docViejo.exists() && docViejo.data().portadaUrl) {
                    portadaFinal = docViejo.data().portadaUrl; 
                }

                await updateProfile(usuarioActual, { displayName: document.getElementById("input-nombre").value.trim(), photoURL: urlFoto });
                
                await setDoc(doc(db, "usuarios", usuarioActual.email), { 
                    genero: document.getElementById("input-genero").value, 
                    edad: document.getElementById("input-edad").value,
                    biografia: document.getElementById("input-bio").value.trim(),
                    portadaUrl: portadaFinal
                }, { merge: true });
                
                window.location.reload();
            } catch (error) { console.error(error); alert("Error al guardar."); btn.disabled = false; msj.style.display="none"; }
        });

        function cargarMisPublicaciones(correoUsuario) {
            const feedDiv = document.getElementById("mis-publicaciones");
            const q = query(collection(db, "publicaciones"), where("autor", "==", correoUsuario));

            onSnapshot(q, (snapshot) => {
                feedDiv.innerHTML = ""; let misPosts = [];
                snapshot.forEach((doc) => { const p = doc.data(); p.id = doc.id; if (p.fecha) misPosts.push(p); });
                misPosts.sort((a, b) => b.fecha.toMillis() - a.fecha.toMillis());
                
                if(misPosts.length === 0) { feedDiv.innerHTML = "<p style='text-align: center; color: var(--texto-secundario);'>Aún no tienes notas.</p>"; return; }

                misPosts.forEach((post) => {
                    const caja = document.createElement("div"); caja.classList.add("post");
                    const fText = post.fecha.toDate().toLocaleDateString('es-ES', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' });
                    let html = `<span class="post-fecha">${fText}</span>`;
                    if (post.texto) html += `<div class="post-texto">${post.texto}</div>`;
                    if (post.imagenUrl) html += `<img src="${post.imagenUrl}" class="post-imagen">`;
                    html += `<div class="contenedor-acciones-post"><button class="btn-eliminar" data-id="${post.id}">🗑️ Borrar</button></div>`;
                    caja.innerHTML = html; feedDiv.appendChild(caja);
                });
            });
        }

        document.getElementById("mis-publicaciones").addEventListener("click", async (e) => {
            if (e.target.classList.contains("btn-eliminar")) {
                const postId = e.target.getAttribute("data-id");
                if (confirm("¿Borrar esta nota para siempre?")) {
                    try { await deleteDoc(doc(db, "publicaciones", postId)); } catch (error) { console.error(error); }
                }
            }
        });
    </script>
</body>
</html>
