<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WueyChat - Reels</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        
        .contenedor-reels { height: 100vh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; scroll-behavior: smooth; }
        .contenedor-reels::-webkit-scrollbar { display: none; }
        
        .reel-carta { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background-color: #111; display: flex; justify-content: center; align-items: center; }
        .reel-video { height: 100%; width: 100%; object-fit: cover; cursor: pointer; }
        
        .reel-ui-inferior { position: absolute; bottom: 80px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: flex-end; z-index: 10; pointer-events: none; }
        .reel-info { flex: 1; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); margin-right: 20px; pointer-events: auto; }
        .reel-autor { font-weight: bold; font-size: 18px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .reel-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }
        .reel-texto { font-size: 15px; line-height: 1.4; }
        
        .reel-acciones { display: flex; flex-direction: column; align-items: center; gap: 20px; pointer-events: auto; margin-bottom: 20px; }
        .btn-accion { background: none; border: none; color: white; font-size: 32px; cursor: pointer; display: flex; flex-direction: column; align-items: center; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); transition: transform 0.2s; }
        .btn-accion:active { transform: scale(1.2); }
        .texto-accion { font-size: 12px; font-weight: bold; margin-top: 5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }

        .barra-top { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 20; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); pointer-events: none; }
        .barra-top h1 { margin: 0; font-size: 22px; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .btn-camara { pointer-events: auto; background: rgba(255,255,255,0.2); border: 2px solid #fff; color: white; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; backdrop-filter: blur(5px); }

        .barra-inferior { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; display: flex; justify-content: space-around; align-items: center; background-color: rgba(0, 0, 0, 0.9); z-index: 100; border-top: 1px solid #333; }
        .btn-icono { background: none; border: none; font-size: 24px; cursor: pointer; color: #888; padding: 8px; border-radius: 50%; }
        .nav-link { text-decoration: none; color: #888; display: flex; flex-direction: column; align-items: center; font-size: 12px; font-weight: bold; }
        .nav-link.activo .btn-icono, .nav-link.activo span { color: #fff; }

        .modal-subir { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 300; justify-content: center; align-items: center; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .caja-subir { background: #222; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        .input-reel { width: 100%; padding: 10px; margin: 15px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
        .btn-subir-final { background: #1877f2; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; }
        .btn-cerrar-modal { background: none; border: none; color: #aaa; margin-top: 15px; cursor: pointer; font-size: 14px; }

        .toast-notificacion { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(24, 119, 242, 0.9); color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 1000; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); backdrop-filter: blur(5px); font-size: 14px; }
        
        /* Ícono de sonido modificado para los avisos del Autoplay */
        .icono-sonido { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; color: rgba(255,255,255,0.9); background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 30px; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 5; font-weight: bold; }
    </style>
</head>
<body>

    <div class="toast-notificacion" id="toast-subiendo">Subiendo Reel... ⏳</div>

    <div class="barra-top">
        <h1>WueyReels</h1>
        <button class="btn-camara" id="btn-abrir-camara">📷</button>
    </div>

    <div class="contenedor-reels" id="feed-reels">
        <div style="height: 100vh; display: flex; justify-content: center; align-items: center; color: #888;">Cargando videos... 🎬</div>
    </div>

    <div class="modal-subir" id="modal-subir">
        <div class="caja-subir">
            <h2 style="margin-top: 0; color: #1877f2;">Nuevo WueyReel</h2>
            <input type="file" id="archivo-reel" accept="video/*" class="input-reel">
            <textarea id="texto-reel" rows="3" placeholder="Describe tu video (se encriptará)..." class="input-reel" style="resize: none;"></textarea>
            <button class="btn-subir-final" id="btn-publicar-reel">Publicar Seguro 🔒</button>
            <button class="btn-cerrar-modal" id="btn-cerrar-modal">Cancelar</button>
        </div>
    </div>

    <div class="barra-inferior">
        <a href="muro.html" class="nav-link"><button class="btn-icono">🏠</button><span>Inicio</span></a>
        <a href="reels.html" class="nav-link activo"><button class="btn-icono" style="color:white;">🎬</button><span style="color:white;">Videos</span></a>
        <a href="perfil.html" class="nav-link"><button class="btn-icono">👤</button><span>Perfil</span></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBdh-HJHC5dbC7GrLrB6pHd6XGZAirNLcM", authDomain: "wueychat.firebaseapp.com", projectId: "wueychat", storageBucket: "wueychat.firebasestorage.app", messagingSenderId: "889745387297", appId: "1:889745387297:web:1b8343a328d854fc99d860", measurementId: "G-LKQ86ZXTRK" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        const CLOUDINARY_CLOUD_NAME = "dizktanb9"; 
        const CLOUDINARY_UPLOAD_PRESET = "wueychat_media";

        // --- SISTEMA DE ENCRIPTACIÓN (AES) ---
        const LLAVE_DIMENSIONAL = "C137_WueyChat_Secreto_2026"; 

        function encriptar(textoCrudo) {
            if(!textoCrudo) return "";
            return CryptoJS.AES.encrypt(textoCrudo, LLAVE_DIMENSIONAL).toString();
        }

        function desencriptar(textoCifrado) {
            if(!textoCifrado) return "";
            try {
                const bytes = CryptoJS.AES.decrypt(textoCifrado, LLAVE_DIMENSIONAL);
                const original = bytes.toString(CryptoJS.enc.Utf8);
                return original ? original : textoCifrado; 
            } catch(e) { return textoCifrado; }
        }

        function formatearTexto(texto) {
            if (!texto) return "";
            let limpio = texto.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            limpio = limpio.replace(/(^|\s)(#[a-zA-Z0-9_ñÑáéíóúÁÉÍÓÚ]+)/g, '$1<span style="color: var(--color-primario); font-weight: bold;">$2</span>');
            const colores = { rojo: '#ff4d4d', azul: '#1877f2', verde: '#4CAF50', amarillo: '#FFC107', naranja: '#FF9800', morado: '#9C27B0', normal: 'inherit' };
            let lineas = limpio.split('\n');
            let parseado = lineas.map(linea => {
                let conSpans = linea.replace(/\+(rojo|azul|verde|amarillo|naranja|morado|normal)\s*/gi, (match, color) => {
                    return `</span><span style="color: ${colores[color.toLowerCase()]}; font-weight: bold;">`;
                });
                return `<span>${conSpans}</span>`; 
            });
            return parseado.join('<br>').replace(/<span><\/span>/g, '');
        }

        let usuarioActual = null; let llaveUsuarioActual = "anonimo";

        onAuthStateChanged(auth, (user) => {
            if (user) { usuarioActual = user; llaveUsuarioActual = user.email.replace(/\./g, '_'); cargarReels(); } 
            else { window.location.href = "index.html"; }
        });

        document.getElementById("btn-abrir-camara").addEventListener("click", () => document.getElementById("modal-subir").style.display = "flex");
        document.getElementById("btn-cerrar-modal").addEventListener("click", () => document.getElementById("modal-subir").style.display = "none");

        // --- SUBIR REEL A "PUBLICACIONES" (ENCRIPTADO) ---
        document.getElementById("btn-publicar-reel").addEventListener("click", async () => {
            const archivoVideo = document.getElementById("archivo-reel").files[0];
            const textoCrudo = document.getElementById("texto-reel").value.trim();
            if (!archivoVideo) { alert("¡Selecciona un video primero!"); return; }

            document.getElementById("modal-subir").style.display = "none";
            const toast = document.getElementById("toast-subiendo");
            toast.innerText = "Subiendo Reel... ⏳"; toast.style.display = "block";
            
            // Encriptamos la descripción del video
            const textoSeguro = encriptar(textoCrudo);

            document.getElementById("archivo-reel").value = ""; document.getElementById("texto-reel").value = "";

            try {
                const formData = new FormData(); formData.append("file", archivoVideo); formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
                const urlCloudinary = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/video/upload`;
                const respuesta = await fetch(urlCloudinary, { method: "POST", body: formData });
                const datos = await respuesta.json();
                
                if (datos.secure_url) {
                    await addDoc(collection(db, "publicaciones"), {
                        autor: usuarioActual.email, autorNombre: usuarioActual.displayName || "Usuario", autorFoto: usuarioActual.photoURL || null,
                        mediaUrl: datos.secure_url, mediaType: "video", texto: textoSeguro, fecha: serverTimestamp(), reacciones: {}, comentarios: []
                    });
                    toast.innerText = "¡Video seguro publicado! ✅"; setTimeout(() => toast.style.display = "none", 3000);
                } else { throw new Error("Error en Cloudinary"); }
            } catch (err) { console.error(err); toast.innerText = "❌ Error al subir"; setTimeout(() => toast.style.display = "none", 4000); } 
        });

        // --- CARGAR REELS (DESENCRIPTAR Y AUTOPLAY CON AUDIO) ---
        function cargarReels() {
            const feedDiv = document.getElementById("feed-reels");
            const q = query(collection(db, "publicaciones"), orderBy("fecha", "desc"));

            onSnapshot(q, (snapshot) => {
                feedDiv.innerHTML = "";
                let hayVideos = false;

                snapshot.forEach((docSnap) => {
                    const post = docSnap.data(); const postId = docSnap.id;
                    const esVideo = post.mediaType === "video" || (post.mediaUrl && post.mediaUrl.match(/\.(mp4|webm|ogg)$/i));
                    
                    if(esVideo) {
                        hayVideos = true;
                        const caja = document.createElement("div"); caja.className = "reel-carta";
                        
                        const reacciones = post.reacciones || {};
                        const tieneMiLike = reacciones[llaveUsuarioActual] === "❤️";
                        const totalLikes = Object.keys(reacciones).length;
                        const totalComentarios = post.comentarios ? post.comentarios.length : 0;
                        const avatarInfo = post.autorFoto ? `<img src="${post.autorFoto}" class="reel-avatar">` : `<div class="reel-avatar" style="background:#1877f2; display:flex; justify-content:center; align-items:center;">${post.autorNombre.charAt(0)}</div>`;

                        // Desencriptar el texto de la publicación
                        let textoDesencriptado = desencriptar(post.texto);
                        let textoFormateado = formatearTexto(textoDesencriptado);

                        // NOTA IMPORTANTE: El video NO TIENE "muted". Intenta sonar por defecto.
                        caja.innerHTML = `
                            <video src="${post.mediaUrl}" class="reel-video" loop playsinline></video>
                            <div class="icono-sonido">🔇</div>
                            <div class="reel-ui-inferior">
                                <div class="reel-info">
                                    <div class="reel-autor">${avatarInfo} @${post.autorNombre.split(" ")[0]}</div>
                                    <div class="reel-texto">${textoFormateado}</div>
                                </div>
                                <div class="reel-acciones">
                                    <button class="btn-accion btn-like" data-id="${postId}" style="color: ${tieneMiLike ? '#ff2b54' : 'white'}">
                                        ${tieneMiLike ? '❤️' : '🤍'} <span class="texto-accion">${totalLikes}</span>
                                    </button>
                                    <button class="btn-accion btn-comentar" data-id="${postId}">
                                        💬 <span class="texto-accion">${totalComentarios}</span>
                                    </button>
                                </div>
                            </div>
                        `;
                        feedDiv.appendChild(caja);
                    }
                });

                if (!hayVideos) {
                    feedDiv.innerHTML = `<div style="height: 100vh; display: flex; justify-content: center; align-items: center; color: #888;">No hay videos en la red aún. ¡Sube el primero! 🎬</div>`;
                    return;
                }

                // --- SISTEMA DE RESCATE DE AUTOPLAY DE AUDIO ---
                const videos = document.querySelectorAll('.reel-video');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) { 
                            // Intentar iniciar CON SONIDO
                            entry.target.muted = false; 
                            const promesaPlay = entry.target.play();
                            
                            if (promesaPlay !== undefined) {
                                promesaPlay.catch(error => {
                                    // Si el navegador bloquea el audio, silenciamos para evitar que se congele
                                    console.log("Navegador bloqueó el audio. Rescatando video...");
                                    entry.target.muted = true;
                                    entry.target.play(); 
                                    
                                    // Mostramos el aviso "🔇 Toca para audio"
                                    const icono = entry.target.nextElementSibling;
                                    icono.innerText = "🔇 Toca para activar audio";
                                    icono.style.opacity = "1";
                                    setTimeout(() => { icono.style.opacity = "0"; }, 3500);
                                });
                            }
                        } 
                        else { 
                            entry.target.pause(); 
                            entry.target.currentTime = 0; 
                        }
                    });
                }, { threshold: 0.6 });

                videos.forEach(video => {
                    observer.observe(video);
                    
                    // Control manual al tocar
                    video.addEventListener('click', () => { 
                        video.muted = !video.muted;
                        const icono = video.nextElementSibling;
                        icono.innerText = video.muted ? "🔇" : "🔊";
                        icono.style.opacity = "1";
                        setTimeout(() => { icono.style.opacity = "0"; }, 1000);
                    });
                });
            });
        }

        // ACCIONES DE BOTONES
        document.getElementById("feed-reels").addEventListener("click", async (e) => {
            const target = e.target.closest('.btn-accion'); if(!target) return;
            const postId = target.getAttribute("data-id");

            if (target.classList.contains("btn-like")) {
                const ref = doc(db, "publicaciones", postId);
                const esCorazonRojo = target.innerText.includes('❤️');
                const act = {}; act[`reacciones.${llaveUsuarioActual}`] = esCorazonRojo ? null : "❤️";
                try { await updateDoc(ref, act); } catch(err){}
            }

            if (target.classList.contains("btn-comentar")) {
                const comentarioCrudo = prompt("Escribe tu comentario seguro:");
                if(comentarioCrudo && comentarioCrudo.trim() !== "") {
                    const comentarioSeguro = encriptar(comentarioCrudo); // Ciframos el comentario
                    try { await updateDoc(doc(db, "publicaciones", postId), { comentarios: arrayUnion({ autor: usuarioActual.email, autorNombre: usuarioActual.displayName || "Usuario", texto: comentarioSeguro }) }); } catch(err){}
                }
            }
        });
    </script>
</body>
</html>
