<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wueychat - Bienvenido</title>
    <style>
        :root {
            --fondo: #f0f2f5;
            --fondo-carta: #ffffff;
            --texto-principal: #1c1e21;
            --texto-secundario: #606770;
            --color-primario: #1877f2;
            --color-hover: #166fe5;
            --color-registro: #42b72a;
            --color-registro-hover: #36a420;
            --borde: #dddfe2;
            --sombra: rgba(0, 0, 0, 0.1);
        }

        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--fondo); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: var(--texto-principal); }
        
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .contenedor {
            background-color: var(--fondo-carta); padding: 50px 40px; border-radius: 16px;
            box-shadow: 0 8px 24px var(--sombra); text-align: center; width: 350px;
            animation: popIn 0.5s ease-out; border: 1px solid var(--borde);
        }
        
        h1 { color: var(--color-primario); margin-bottom: 5px; font-size: 42px; font-weight: 800; letter-spacing: -1.5px; margin-top: 0; }
        p.subtitulo { color: var(--texto-secundario); margin-bottom: 30px; font-size: 18px; font-weight: 500; }
        
        input {
            width: 100%; padding: 14px; margin: 10px 0; border: 1px solid var(--borde);
            border-radius: 8px; box-sizing: border-box; font-size: 16px;
            background-color: #f5f6f7; transition: all 0.2s ease;
        }
        input:focus { outline: none; border-color: var(--color-primario); background-color: white; box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.2); }
        
        .btn-login {
            width: 100%; padding: 14px; margin-top: 15px; background-color: var(--color-primario);
            color: white; border: none; border-radius: 8px; font-size: 20px; font-weight: bold;
            cursor: pointer; transition: all 0.2s ease;
        }
        .btn-login:hover { background-color: var(--color-hover); transform: translateY(-2px); }
        .btn-login:active { transform: translateY(0); }
        
        .linea-separadora { border-bottom: 1px solid var(--borde); margin: 25px 0; }
        
        .btn-registro {
            padding: 14px 24px; background-color: var(--color-registro);
            color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: bold;
            cursor: pointer; transition: all 0.2s ease;
        }
        .btn-registro:hover { background-color: var(--color-registro-hover); transform: translateY(-2px); }
        
        #mensaje { margin-top: 20px; font-size: 15px; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Wueychat</h1>
        <p class="subtitulo">Conéctate premium con tus amigos.</p>
        
        <input type="text" id="nombre" placeholder="Tu Nombre (Solo para registro)">
        <input type="email" id="email" placeholder="Correo electrónico" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        
        <button id="btn-login" class="btn-login">Iniciar sesión</button>
        <p id="mensaje"></p>
        
        <div class="linea-separadora"></div>
        
        <button id="btn-registrar" class="btn-registro">Crear cuenta nueva</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdh-HJHC5dbC7GrLrB6pHd6XGZAirNLcM",
            authDomain: "wueychat.firebaseapp.com",
            projectId: "wueychat",
            storageBucket: "wueychat.firebasestorage.app",
            messagingSenderId: "889745387297",
            appId: "1:889745387297:web:1b8343a328d854fc99d860",
            measurementId: "G-LKQ86ZXTRK"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const mensajeDiv = document.getElementById("mensaje");
        const inputNombre = document.getElementById("nombre");
        const inputEmail = document.getElementById("email");
        const inputPassword = document.getElementById("password");

        // REGISTRAR
        document.getElementById("btn-registrar").addEventListener("click", () => {
            const nombre = inputNombre.value.trim();
            const email = inputEmail.value.trim();
            const password = inputPassword.value;

            if(!email || !password || !nombre) {
                mostrarMensaje("red", "✍️ Llena todo, incluido tu nombre VIP.");
                return;
            }

            mostrarMensaje(document.body.style.getPropertyValue('--color-primario'), "✨ Creando tu espacio premium...");

            createUserWithEmailAndPassword(auth, email, password)
                .then(async (userCredential) => {
                    await updateProfile(userCredential.user, { displayName: nombre });
                    mostrarMensaje("green", "🎉 ¡Cuenta VIP creada! Vamos a configurarla...");
                    setTimeout(() => { window.location.href = "perfil.html"; }, 1500);
                })
                .catch((error) => { mostrarMensaje("red", "❌ Error: " + error.message); });
        });

        // INICIAR SESIÓN
        document.getElementById("btn-login").addEventListener("click", () => {
            const email = inputEmail.value.trim();
            const password = inputPassword.value;

            if(!email || !password) {
                mostrarMensaje("red", "🔑 Correo y contraseña, por favor.");
                return;
            }

            mostrarMensaje(document.body.style.getPropertyValue('--color-primario'), "🚀 Entrando a Wueychat...");

            signInWithEmailAndPassword(auth, email, password)
                .then(() => { window.location.href = "muro.html"; })
                .catch(() => { mostrarMensaje("red", "❌ Datos incorrectos, wuey."); });
        });

        function mostrarMensaje(color, texto) {
            mensajeDiv.style.color = color;
            mensajeDiv.innerText = texto;
            // Pequeña animación de pulso en el mensaje
            mensajeDiv.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 300 });
        }
    </script>
</body>
</html>
