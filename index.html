<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WueyChat - Conéctate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%; font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #1877f2, #9C27B0, #ff4d4d, #18191a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            color: #fff; position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- NUEVO: SISTEMA DE EMOJIS CAYENDO --- */
        .contenedor-emojis {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Para que no estorben si les das clic */
            z-index: 1; overflow: hidden;
        }
        
        .emoji-cayendo {
            position: absolute; top: -10%;
            opacity: 0.25; /* Medios transparentes para que no saturen la pantalla */
            animation: caer linear infinite;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));
        }

        @keyframes caer {
            0% { transform: translateY(0) rotate(0deg) translateX(0); }
            50% { transform: translateY(60vh) rotate(180deg) translateX(20px); }
            100% { transform: translateY(110vh) rotate(360deg) translateX(-20px); }
        }

        /* Efecto Cristal (Glassmorphism) */
        .caja-cristal {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px; padding: 40px 30px;
            width: 100%; max-width: 380px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            text-align: center; position: relative;
            z-index: 10; /* Siempre por encima de los emojis */
            transition: transform 0.3s ease;
        }

        .logo-wueychat { font-size: 36px; font-weight: 800; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); letter-spacing: 1px; }
        .subtitulo { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 30px; }

        .selector-modo { display: flex; background: rgba(0,0,0,0.3); border-radius: 30px; margin-bottom: 25px; position: relative; }
        .btn-modo { flex: 1; padding: 12px; border: none; background: transparent; color: white; font-weight: 600; cursor: pointer; z-index: 1; font-family: 'Poppins', sans-serif; transition: color 0.3s; }
        
        .pastilla-activa {
            position: absolute; top: 0; left: 0; height: 100%; width: 50%;
            background: #1877f2; border-radius: 30px; transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(24, 119, 242, 0.4);
        }

        .formulario { display: none; flex-direction: column; gap: 15px; animation: fadeIn 0.5s ease; }
        .formulario.activo { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-grupo { position: relative; width: 100%; text-align: left; }
        .input-cristal {
            width: 100%; padding: 15px 15px 15px 45px; border-radius: 12px;
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            color: white; font-size: 15px; font-family: 'Poppins', sans-serif;
            box-sizing: border-box; transition: all 0.3s; outline: none;
        }
        .input-cristal::placeholder { color: rgba(255,255,255,0.6); }
        .input-cristal:focus { background: rgba(0,0,0,0.5); border-color: #1877f2; box-shadow: 0 0 10px rgba(24, 119, 242, 0.3); }
        
        .icono-input { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 18px; color: rgba(255,255,255,0.7); }

        .btn-principal {
            background: #1877f2; color: white; border: none; padding: 15px; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif;
            margin-top: 10px; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(24, 119, 242, 0.3);
        }
        .btn-principal:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(24, 119, 242, 0.5); }
        .btn-principal:active { transform: translateY(0); }
        .btn-principal:disabled { background: #555; cursor: not-allowed; box-shadow: none; transform: none; }

        .mensaje-error { color: #ff4d4d; font-size: 13px; font-weight: 600; background: rgba(255, 77, 77, 0.1); padding: 10px; border-radius: 8px; display: none; margin-top: 10px; border: 1px solid rgba(255, 77, 77, 0.3); }
    </style>
</head>
<body>

    <div id="contenedor-emojis" class="contenedor-emojis"></div>

    <div class="caja-cristal">
        <div class="logo-wueychat">WueyChat</div>
        <div class="subtitulo">La nueva forma de conectar</div>

        <div class="selector-modo">
            <div class="pastilla-activa" id="pastilla"></div>
            <button class="btn-modo" id="btn-tab-login">Entrar</button>
            <button class="btn-modo" id="btn-tab-registro">Registro</button>
        </div>

        <div class="formulario activo" id="form-login">
            <div class="input-grupo">
                <span class="icono-input">📧</span>
                <input type="email" id="login-email" class="input-cristal" placeholder="Tu correo electrónico">
            </div>
            <div class="input-grupo">
                <span class="icono-input">🔒</span>
                <input type="password" id="login-pass" class="input-cristal" placeholder="Tu contraseña">
            </div>
            <button class="btn-principal" id="btn-entrar">Iniciar Sesión</button>
            <div class="mensaje-error" id="error-login"></div>
        </div>

        <div class="formulario" id="form-registro">
            <div class="input-grupo">
                <span class="icono-input">👤</span>
                <input type="text" id="reg-nombre" class="input-cristal" placeholder="Tu nombre o apodo">
            </div>
            <div class="input-grupo">
                <span class="icono-input">📧</span>
                <input type="email" id="reg-email" class="input-cristal" placeholder="Correo electrónico">
            </div>
            <div class="input-grupo">
                <span class="icono-input">🔒</span>
                <input type="password" id="reg-pass" class="input-cristal" placeholder="Crea una contraseña">
            </div>
            <button class="btn-principal" id="btn-registrar">Crear mi cuenta</button>
            <div class="mensaje-error" id="error-registro"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // EL GENERADOR DE EMOJIS 🌧️
        const emojisLibres = ['💬', '🎮', '📱', '❤️', '🎬', '🚀', '🌍', '🔔', '🔥', '✨', '🎵', '🕹️', '👾', '🌟'];
        const contenedorEmojis = document.getElementById('contenedor-emojis');

        // Función para crear 35 emojis con tamaños y tiempos diferentes
        for (let i = 0; i < 35; i++) {
            let emoji = document.createElement('div');
            emoji.classList.add('emoji-cayendo');
            emoji.innerText = emojisLibres[Math.floor(Math.random() * emojisLibres.length)];
            
            // Posición horizontal aleatoria (de 0 a 100% de la pantalla)
            emoji.style.left = Math.random() * 100 + 'vw';
            
            // Tamaño aleatorio (entre 15px y 35px)
            emoji.style.fontSize = (Math.random() * 20 + 15) + 'px';
            
            // Velocidad de caída aleatoria (entre 5 y 12 segundos)
            emoji.style.animationDuration = (Math.random() * 7 + 5) + 's';
            
            // Retraso para que no caigan todos al mismo tiempo
            emoji.style.animationDelay = (Math.random() * 10) + 's';
            
            contenedorEmojis.appendChild(emoji);
        }

        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBdh-HJHC5dbC7GrLrB6pHd6XGZAirNLcM",
            authDomain: "wueychat.firebaseapp.com",
            projectId: "wueychat",
            storageBucket: "wueychat.firebasestorage.app",
            messagingSenderId: "889745387297",
            appId: "1:889745387297:web:1b8343a328d854fc99d860",
            measurementId: "G-LKQ86ZXTRK"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) { window.location.href = "muro.html"; }
        });

        // ANIMACIÓN DE LAS PESTAÑAS
        const btnTabLogin = document.getElementById('btn-tab-login');
        const btnTabRegistro = document.getElementById('btn-tab-registro');
        const pastilla = document.getElementById('pastilla');
        const formLogin = document.getElementById('form-login');
        const formRegistro = document.getElementById('form-registro');
        const errorLogin = document.getElementById('error-login');
        const errorRegistro = document.getElementById('error-registro');

        btnTabLogin.addEventListener('click', () => {
            pastilla.style.transform = 'translateX(0%)';
            formRegistro.classList.remove('activo');
            setTimeout(() => formLogin.classList.add('activo'), 150);
            errorLogin.style.display = 'none';
        });

        btnTabRegistro.addEventListener('click', () => {
            pastilla.style.transform = 'translateX(100%)';
            formLogin.classList.remove('activo');
            setTimeout(() => formRegistro.classList.add('activo'), 150);
            errorRegistro.style.display = 'none';
        });

        // LÓGICA DE INICIO DE SESIÓN
        document.getElementById('btn-entrar').addEventListener('click', async (e) => {
            const btn = e.target;
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            
            if(!email || !pass) {
                errorLogin.innerText = "Por favor, llena todos los campos.";
                errorLogin.style.display = 'block'; return;
            }

            btn.disabled = true; btn.innerText = "Conectando... 🚀";
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                btn.disabled = false; btn.innerText = "Iniciar Sesión";
                errorLogin.style.display = 'block';
                if(error.code === 'auth/invalid-credential') errorLogin.innerText = "❌ Correo o contraseña incorrectos.";
                else errorLogin.innerText = "❌ Hubo un error al entrar.";
            }
        });

        // LÓGICA DE REGISTRO
        document.getElementById('btn-registrar').addEventListener('click', async (e) => {
            const btn = e.target;
            const nombre = document.getElementById('reg-nombre').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();

            if(!nombre || !email || !pass) {
                errorRegistro.innerText = "Faltan datos para crear tu cuenta.";
                errorRegistro.style.display = 'block'; return;
            }
            if(pass.length < 6) {
                errorRegistro.innerText = "La contraseña debe tener al menos 6 letras.";
                errorRegistro.style.display = 'block'; return;
            }

            btn.disabled = true; btn.innerText = "Forjando perfil... 🛠️";
            try {
                const credencial = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(credencial.user, { displayName: nombre });
            } catch (error) {
                btn.disabled = false; btn.innerText = "Crear mi cuenta";
                errorRegistro.style.display = 'block';
                if(error.code === 'auth/email-already-in-use') errorRegistro.innerText = "❌ Ese correo ya está registrado.";
                else errorRegistro.innerText = "❌ Error al crear la cuenta.";
            }
        });
    </script>
</body>
</html>
